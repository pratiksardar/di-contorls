      </style>

      <div

        <!-- stage: the window pile inside the zoom rig -->
        <div

        >
          <div class="f02-zoom-outer" id="f02-zoom-outer">
            <div class="f02-zoom-inner" id="f02-zoom-inner">

              <div class="f02-win f02-term" id="f02-term1">

                <div class="f02-term-body">

              <!-- the meeting window — hero, on top of the pile -->

                    <span class="f02-dot"></span><span class="f02-dot"></span

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        /* Scene windows scaled from the 8.0s storyboard estimate to the
           synced 6.037s duration (×0.7546):
           S1 0–1.36 · S2 1.36–3.17 · S3 3.17–4.98 · S4 4.98–6.04 */

        /* ---- Scene 1 — meeting window seats center (spring-pop, smooth) ---- */
        tl.fromTo(
          "#f02-hairlines",
          { opacity: 0 },
          { opacity: 1, duration: 0.6, ease: "power2.out" },
          0,
        );
        tl.fromTo(
          "#f02-call",
          { scale: 0.86, y: 36, opacity: 0 },
          { scale: 1, y: 0, opacity: 1, duration: 0.75, ease: "power3.out" },
          0.05,
        );
        gsap.utils.toArray(".f02-tile").forEach((el, i) => {
          tl.fromTo(
            el,
            { scale: 0.94, opacity: 0 },
            { scale: 1, opacity: 1, duration: 0.45, ease: "power3.out" },
            0.35 + i * 0.06,
          );
        });

        /* ---- Scene 2 — three terminals fly in from the wings, sequentially,
                and stack BEHIND the call window (center-outward-expansion,
                reversed: wing offset → 0 via translate, never left/top) ---- */
        const wings = [
          { sel: "#f02-term1", fx: -820, fy: -40, at: 1.4 },
          { sel: "#f02-term2", fx: 840, fy: -30, at: 1.78 },
          { sel: "#f02-term3", fx: -260, fy: 520, at: 2.16 },
        ];
        wings.forEach((w) => {
          tl.fromTo(
            w.sel,
            { x: w.fx, y: w.fy, scale: 0.94, opacity: 0 },
            { x: 0, y: 0, scale: 1, opacity: 1, duration: 0.8, ease: "power3.out" },
            w.at,
          );
        });

        /* ---- Scene 3 — coordinate-target-zoom onto the buried banner.
           All layout is absolute px, so the offset is exact by construction:
           visible banner text zone centers at source (500, 760); to land it at
           screen (960, 520) with S = 2.05: counterX = 460, counterY = -230.
           Outer scales, inner translates — same duration + ease, in lockstep. ---- */
        const ZOOM_AT = 3.3;
        const ZOOM_DUR = 1.45;
        tl.fromTo(
          "#f02-zoom-outer",
          { scale: 1 },
          { scale: 2.05, duration: ZOOM_DUR, ease: "power3.inOut" },
          ZOOM_AT,
        );
        tl.fromTo(
          "#f02-zoom-inner",
          { x: 0, y: 0 },
          { x: 460, y: -230, duration: ZOOM_DUR, ease: "power3.inOut" },
          ZOOM_AT,
        );

        /* ---- Scene 3b — the orange chip pulses once, dimly (asr-keyword-glow:
           attack/sustain/release envelope on a single linear driver) ---- */
        const banner = document.getElementById("f02-banner");
        const PULSE = { start: 0.1, end: 0.42, attack: 0.16, release: 0.4, rest: 0.25 };
        function f02Env(t) {
          const relEnd = PULSE.end + PULSE.release;
          if (t < PULSE.start) return 0;
          if (t < PULSE.end) return Math.min((t - PULSE.start) / PULSE.attack, 1);
          if (t < relEnd) return 1 - ((t - PULSE.end) / PULSE.release) * (1 - PULSE.rest);
          return PULSE.rest;
        }
        const pulseDriver = { t: 0 };
        tl.to(
          pulseDriver,
          {
            t: 0.95,
            duration: 0.95,
            ease: "none",
            onUpdate: () => {
              const e = f02Env(pulseDriver.t);
              banner.style.boxShadow = `0 0 ${Math.round(22 * e)}px rgba(255, 159, 10, ${(
                0.25 +
                0.35 * e
              ).toFixed(3)})`;
              banner.style.transform = `scale(${(1 + 0.03 * e).toFixed(4)})`;
            },
          },
          4.3,
        );

        /* ---- Scene 4 — mono counter ticks 19:58 → 22:00 beside the banner
           (counting-dynamic-scale: value + font-size in ONE tween, tabular-nums,
           restrained growth, power3.out — no overshoot) ---- */
        tl.fromTo(
          "#f02-counter-block",
          { opacity: 0, y: 14 },
          { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" },
          4.95,
        );
        const counterEl = document.getElementById("f02-counter");
        const count = { v: 1198, fs: 40 }; // 19:58 → 22:00 in seconds
        tl.to(
          count,
          {
            v: 1320,
            fs: 56,
            duration: 0.9,
            ease: "power3.out",
            onUpdate: () => {
              const s = Math.round(count.v);
              counterEl.textContent =
                Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
              counterEl.style.fontSize = count.fs + "px";
            },
          },
          5.0,
        );

        /* hold the claustrophobic read — no exit (root transition owns it) */

        window.__timelines["02-buried"] = tl;
      </script>
