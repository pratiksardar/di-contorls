<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- head is source-file metadata only; the runtime clones <template> contents -->
  </head>
  <body>
    <template>
      <style>
        @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=Inter:wght@900&display=swap");

        /* Root styled via #root — never a class on the data-composition-id element */
        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          container-type: size;
          font-family: "Inter", sans-serif;
        }

        /* Full-bleed ground as a dedicated clip, never painted on #root */
        .bg {
          position: absolute;
          inset: 0;
          background: #000000;
        }

        /* Scene 1 — mic-state line, left-anchored so the token swaps IN PLACE
           (prefix never moves; a wider token only extends right) */
        .mic-wrap {
          position: absolute;
          top: 0;
          left: 18.5cqw;
          height: 83cqh; /* caption keep-out: center inside top 83% */
          display: flex;
          align-items: center;
        }
        .mic-line {
          font-size: 8cqw;
          font-weight: 900;
          line-height: 1;
          letter-spacing: -0.03em;
          text-transform: lowercase;
          white-space: pre; /* keeps the trailing space in the prefix */
          color: rgba(255, 255, 255, 0.92);
          opacity: 0;
        }
        .mic-token {
          color: #ff9f0a;
        }

        /* Scene 2 — three mono ghost-chips on the rule-of-thirds row */
        .chips {
          position: absolute;
          top: 31cqh;
          left: 0;
          right: 0;
          display: flex;
          justify-content: center;
          gap: 7cqw;
        }
        .f03-chip {
          font-family: "IBM Plex Mono", monospace;
          font-weight: 500;
          font-size: 1.4cqw;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: #ffffff;
          border: 1px solid #282726; /* hairline, 0 radius — flat plane */
          padding: 1.4cqh 1.6cqw;
          white-space: nowrap;
          opacity: 0; /* animated to 0.4 = the 40% ghost read */
        }

        /* Scene 3 — the display word that un-exists */
        .word-wrap {
          position: absolute;
          top: 44cqh;
          left: 0;
          right: 0;
          text-align: center;
        }
        .word {
          font-size: 13cqw;
          font-weight: 900;
          line-height: 0.88;
          letter-spacing: -0.04em;
          text-transform: lowercase;
          color: #ffffff;
          opacity: 0;
        }
      </style>

      <div
        id="root"
        data-composition-id="03-invisible"
        data-width="1920"
        data-height="1080"
        data-duration="6.309"
      >
        <!-- ground -->
        <div class="clip bg" data-start="0" data-duration="6.309" data-track-index="0"></div>

        <!-- Scene 1 (0–1.857s): "are you muted?" — in-place token cycle.
             Clip window ends = the storyboard's hard cut (no exit tween). -->
        <div class="clip mic-wrap" data-start="0" data-duration="1.857" data-track-index="1">
          <div class="mic-line" id="f03-mic-line"><span>are you </span><span class="mic-token" id="f03-token">muted?</span></div>
        </div>

        <!-- Scene 2+3 (1.857–5.909s): ghost chips reveal one per spoken cue, then fade with the word -->
        <div class="clip chips" data-start="1.857" data-duration="4.452" data-track-index="1">
          <div class="f03-chip" id="f03-chip-1">mic state</div>
          <div class="f03-chip" id="f03-chip-2">agent state</div>
          <div class="f03-chip" id="f03-chip-3">your script</div>
        </div>

        <!-- Scene 3 (3.883–5.909s): "invisible." lands at 90%, decays to 12% — the held near-black read -->
        <div class="clip word-wrap" data-start="3.883" data-duration="2.426" data-track-index="2">
          <div class="word" id="f03-word">invisible.</div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        /* ---- Scene 1: line lands via hard cut + long-tail settle (power3) ---- */
        tl.fromTo("#f03-mic-line", { opacity: 0 }, { opacity: 1, duration: 0.06, ease: "none" }, 0.12);
        tl.fromTo("#f03-mic-line", { y: 16 }, { y: 0, duration: 0.9, ease: "power3.out" }, 0.12);

        /* discrete-text-sequence — in-place token cycle, instant swaps on the ticks
           of "are you sure?": muted? -> unmuted? -> muted?? */
        const SEQ = [
          { t: 0.0, text: "muted?" },
          { t: 1.15, text: "unmuted?" },
          { t: 1.5, text: "muted??" },
        ];
        function textAt(time) {
          for (let i = SEQ.length - 1; i >= 0; i--) {
            if (time >= SEQ[i].t) return SEQ[i].text;
          }
          return SEQ[0].text;
        }
        const tokenEl = document.getElementById("f03-token");
        const driver = { t: 0 };
        let lastText = "";
        tl.to(
          driver,
          {
            t: 1.857,
            duration: 1.857,
            ease: "none",
            onUpdate: () => {
              const s = textAt(driver.t);
              if (s !== lastText) {
                tokenEl.textContent = s;
                lastText = s;
              }
            },
          },
          0,
        );

        /* ---- Scene 2: dynamic-content-sequencing — one ghost-chip per spoken cue
           across "everything you're worried about right now" ---- */
        const CHIPS = [
          { sel: "#f03-chip-1", t: 2.0 },
          { sel: "#f03-chip-2", t: 2.65 },
          { sel: "#f03-chip-3", t: 3.3 },
        ];
        CHIPS.forEach(({ sel, t }) => {
          tl.fromTo(
            sel,
            { opacity: 0, y: 14 },
            { opacity: 0.4, y: 0, duration: 0.7, ease: "power3.out" },
            t,
          );
        });

        /* ---- Scene 3: "invisible." lands at 90% on the cue... ---- */
        tl.fromTo("#f03-word", { opacity: 0 }, { opacity: 0.9, duration: 0.07, ease: "none" }, 3.96);
        tl.fromTo("#f03-word", { scale: 1.03 }, { scale: 1, duration: 0.9, ease: "power3.out" }, 3.96);

        /* ...then decays in place to 12% — the word disappears while you watch.
           Not an exit: the scripted stillness beat; it settles at 12% and HOLDS. */
        tl.to("#f03-word", { opacity: 0.12, duration: 1.0, ease: "power1.inOut" }, 4.55);
        tl.to(".f03-chip", { opacity: 0.07, duration: 1.0, ease: "power1.inOut" }, 4.55);

        window.__timelines["03-invisible"] = tl;
      </script>
    </template>
  </body>
</html>
