                <path d="M1.5 9.5c0 3.6 2.6 6 6 6s6-2.4 6-6" stroke="rgba(255,255,255,0.9)" stroke-width="1.6" stroke-linecap="round" fill="none" />
                <path d="M7.5 15.5v4" stroke="rgba(255,255,255,0.9)" stroke-width="1.6" stroke-linecap="round" />

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Frame 6 — the whole fleet. duration 4.907s (authoritative).
        // Scene windows scaled 4.907/7.0: S1 0–1.26 · S2 1.26–3.23 · S3 3.23–4.91
        const ROW_H = 108; // slot pitch for the FLIP reorder

        /* ---- Scene 1 (0–1.26): rail + empty island panel seats ---- */
        tl.fromTo("#f6-kicker", { opacity: 0, y: 16 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 0.08);
        tl.fromTo("#f6-display", { opacity: 0, y: 34 }, { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 0.26);
        // "every session on your machine" — empty list panel scale-settles
        tl.fromTo(
          "#f6-panel",
          { opacity: 0, y: 28, scale: 0.93 },
          { opacity: 1, y: 0, scale: 1, duration: 0.75, ease: "power3.out" },
          0.35
        );

        // "…live" (~1.55): the LIVE chip pulses once (asr-keyword-glow, single envelope)
        tl.fromTo("#f6-live", { opacity: 0.55 }, { opacity: 1, duration: 0.15, ease: "power2.out" }, 1.55);
        tl.to("#f6-live", { opacity: 0.8, duration: 0.4, ease: "power3.out" }, 1.9);
        tl.fromTo("#f6-livedot", { scale: 1 }, { scale: 1.4, duration: 0.15, ease: "power2.out" }, 1.55);
        tl.to("#f6-livedot", { scale: 1, duration: 0.35, ease: "power3.out" }, 1.8);

        /* ---- rail cue helper: fade-up + karaoke glow envelope ----
           asr-keyword-glow (karaoke color-lerp): attack to accent, release to rest */
        function cue(sel, t) {
          tl.fromTo(sel, { opacity: 0, y: 14 }, { opacity: 1, y: 0, duration: 0.4, ease: "expo.out" }, t);
          tl.fromTo(sel, { color: "#ffffff" }, { color: "#ff9f0a", duration: 0.18, ease: "power2.out" }, t);
          tl.fromTo(sel, { scale: 1 }, { scale: 1.05, transformOrigin: "0% 50%", duration: 0.18, ease: "power2.out" }, t);
          tl.to(sel, { color: "rgba(255,255,255,0.78)", scale: 1, duration: 0.45, ease: "power3.out" }, t + 0.5);
        }

        /* ---- Scene 2 (1.26–3.23): rows tick in, one per spoken cue ---- */
        // "who's working" (~2.25): green working row
        tl.fromTo("#f6-row-working", { opacity: 0, x: 30 }, { opacity: 1, x: 0, duration: 0.55, ease: "expo.out" }, 2.25);
        cue("#f6-cue-working", 2.28);

        // "who's blocked" (~3.05): orange row + needs-you capsule
        tl.fromTo("#f6-row-blocked", { opacity: 0, x: 30 }, { opacity: 1, x: 0, duration: 0.55, ease: "expo.out" }, 3.05);
        tl.fromTo("#f6-capsule", { opacity: 0, scale: 0.6 }, { opacity: 1, scale: 1, duration: 0.4, ease: "expo.out" }, 3.2);
        cue("#f6-cue-blocked", 3.08);

        /* ---- Scene 3 (3.23–4.91): FLIP sort, done card, idle row, hold ---- */
        // blocked row sorts itself to the top — FLIP-style swap, smooth power3
        tl.to("#f6-row-blocked", { y: -ROW_H, duration: 0.55, ease: "power3.inOut" }, 3.5);
        tl.to("#f6-row-working", { y: ROW_H, duration: 0.55, ease: "power3.inOut" }, 3.5);

        // "who's done" (~3.9): green ✓ done card
        tl.fromTo("#f6-row-done", { opacity: 0, x: 30 }, { opacity: 1, x: 0, duration: 0.55, ease: "expo.out" }, 3.9);
        tl.fromTo("#f6-check", { scale: 0.5 }, { scale: 1, duration: 0.4, ease: "power3.out" }, 3.95);
        cue("#f6-cue-done", 3.93);

        // dim idle row completes the picture
        tl.fromTo("#f6-row-idle", { opacity: 0, x: 18 }, { opacity: 0.75, x: 0, duration: 0.5, ease: "power3.out" }, 4.3);

        // hold the read — subtle jitter only (sine-wave-loop, low amplitude, finite)
        tl.to("#f6-panel", { y: 1.6, duration: 0.28, ease: "sine.inOut" }, 4.35);
        tl.to("#f6-panel", { y: 0, duration: 0.28, ease: "sine.inOut" }, 4.63);

        window.__timelines["06-fleet"] = tl;
      </script>
