        /* split stage — top 83% only; caption band below y=900 stays clear */

        .panel {

        /* ── recreated desktop ── */

        /* ── inner-edge pill badges (signature punctuation) ── */
        .badge {
          position: absolute;

        }

          right: 966px; /* right edge overlaps left panel's inner edge (x=924) */

        }
        .badge-r {
          left: 966px; /* left edge overlaps right panel's inner edge (x=996) */
          background: #1a1918;

        }
      </style>

      <div id="root" data-composition-id="08-prompter" data-duration="6.608" data-width="1920" data-height="1080">
        <!-- full-bleed ground on a clip, never on #root -->
        <div id="p8-bg" class="clip bg" data-start="0" data-duration="6.608" data-track-index="0"></div>

        <div id="p8-stage-clip" class="clip" data-start="0" data-duration="6.608" data-track-index="1" style="position: absolute; inset: 0;">
          <div class="glow glow-l" id="p8-glow-l"></div>
          <div class="glow glow-r" id="p8-glow-r"></div>

          <div class="stage">
            <!-- LEFT — your screen: desktop WITH the prompter -->
            <div class="side" id="p8-wrap-l">
              <div class="panel" id="p8-panel-l">
                <div class="window">
                  <div class="win-titlebar">
                    <div class="win-dot"></div>
                    <div class="win-dot"></div>
                    <div class="win-dot"></div>
                  </div>
                  <div class="win-body">
                    <div class="skel" style="width: 70%"></div>
                    <div class="skel" style="width: 45%"></div>
                    <div class="skel" style="width: 60%"></div>
                    <div class="skel" style="width: 52%"></div>
                    <div class="skel" style="width: 30%"></div>
                  </div>
                </div>
                <div class="menubar">
                  <div class="menu-items">finder&nbsp;&nbsp;file&nbsp;&nbsp;edit&nbsp;&nbsp;view</div>
                  <div class="menu-status"><span class="cam-dot"></span><span>2:47 pm</span></div>
                </div>
                <div class="notch"></div>
                <div class="prompter-mask">
                  <div class="prompter" id="p8-prompter">
                    <div class="script" id="p8-script">

            <!-- RIGHT — what they see: the SAME desktop, prompter conspicuously absent -->
            <div class="side" id="p8-wrap-r">
              <div class="panel" id="p8-panel-r">
                <div class="window">
                  <div class="win-titlebar">
                    <div class="win-dot"></div>
                    <div class="win-dot"></div>
                    <div class="win-dot"></div>
                  </div>
                  <div class="win-body">
                    <div class="skel" style="width: 70%"></div>
                    <div class="skel" style="width: 45%"></div>
                    <div class="skel" style="width: 60%"></div>
                    <div class="skel" style="width: 52%"></div>
                    <div class="skel" style="width: 30%"></div>
                  </div>
                </div>
                <div class="menubar">
                  <div class="menu-items">finder&nbsp;&nbsp;file&nbsp;&nbsp;edit&nbsp;&nbsp;view</div>
                  <div class="menu-status"><span class="cam-dot"></span><span>2:47 pm</span></div>
                </div>
                <div class="notch"></div>
              </div>
            </div>
          </div>

          <!-- badges float on the stage parent so they never inherit the panels' rotateY -->
          <div class="badge badge-l" id="p8-badge-l">your screen</div>
          <div class="badge badge-r" id="p8-badge-r">what they see</div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        // Scene windows scaled from the storyboard's 7.0s estimate to the synced
        // 6.208s duration (x0.887): S1 0-2.13 / S2 2.13-4.08 / S3 4.08-6.21.

        // ── Scene 1 — "the teleprompter under your camera?" ──
        // split-tilt-cards signature: left card from the left wing, mirrored
        // book-open rotateY (+12), scale 0.9→1, smooth power3 settle. No overshoot.
        tl.fromTo(
          "#p8-panel-l",
          { x: -380, rotationY: 20, scale: 0.9, opacity: 0 },
          { x: 0, rotationY: 12, scale: 1, opacity: 1, duration: 1.05, ease: "power3.out" },
          0.05
        );
        // faint accent glow blooms with the left panel (ambient-glow-bloom, form A, no breathe)
        tl.fromTo(
          "#p8-glow-l",
          { opacity: 0, scale: 0.85 },
          { opacity: 0.1, scale: 1, duration: 1.0, ease: "power2.out" },
          0.15
        );
        // the prompter slides down out of the notch (masked reveal)
        tl.fromTo(
          "#p8-prompter",
          { y: -190 },
          { y: 0, duration: 0.85, ease: "expo.out" },
          0.95
        );
        // orange reading guide draws on
        tl.fromTo(
          "#p8-guide",
          { scaleY: 0 },
          { scaleY: 1, duration: 0.4, ease: "power3.out" },
          1.55
        );

        // ── Scene 2 — "your audience will never see it" ──
        // right card mirrors in from the right wing (-12 tilt); the emptiness
        // under its notch IS the reveal.
        tl.fromTo(
          "#p8-panel-r",
          { x: 380, rotationY: -20, scale: 0.9, opacity: 0 },
          { x: 0, rotationY: -12, scale: 1, opacity: 1, duration: 1.05, ease: "power3.out" },
          2.18
        );
        tl.fromTo(
          "#p8-glow-r",
          { opacity: 0, scale: 0.85 },
          { opacity: 0.06, scale: 1, duration: 1.0, ease: "power2.out" },
          2.28
        );
        // one slow single scroll of the script — LEFT only, constant prompter crawl
        tl.fromTo(
          "#p8-script",
          { y: 0 },
          { y: -92, duration: 3.15, ease: "none" },
          2.95
        );

        // ── Scene 3 — "yours — and only yours" ──
        // inner-edge pill badges pop on cue. Direction bans overshoot, so the
        // blueprint's badge punctuation lands as a crisp expo settle instead.
        tl.fromTo(
          "#p8-badge-l",
          { scale: 0.6, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.5, ease: "expo.out" },
          4.15
        );
        tl.fromTo(
          "#p8-badge-r",
          { scale: 0.6, opacity: 0 },
          { scale: 1, opacity: 1, duration: 0.5, ease: "expo.out" },
          4.48
        );

        // Phase-opposed idle jitter on the pair (sine-wave-loop, LOW amplitude:
        // 2px, left sin(t) vs right sin(t+PI)), with an envelope that fades to
        // zero over the last 25% so the split holds truly still at the end.
        // Written to the .side wrappers, which carry no other tweens (two-layer
        // split so entry x/scale and idle never collide on one alias).
        const wrapL = document.getElementById("p8-wrap-l");
        const wrapR = document.getElementById("p8-wrap-r");
        const phase = { p: 0 };
        const CYCLES = 1.1;
        tl.to(
          phase,
          {
            p: Math.PI * 2 * CYCLES,
            duration: 2.75,
            ease: "none",
            onUpdate: () => {
              const t = phase.p / (Math.PI * 2 * CYCLES); // 0→1 across idle
              const env = t < 0.75 ? 1 : (1 - t) / 0.25; // settle in the tail
              const amp = 2 * env;
              wrapL.style.transform = "translateY(" + (Math.sin(phase.p) * amp).toFixed(3) + "px)";
              wrapR.style.transform = "translateY(" + (Math.sin(phase.p + Math.PI) * amp).toFixed(3) + "px)";
            },
          },
          3.35
        );

        window.__timelines["08-prompter"] = tl;
      </script>
