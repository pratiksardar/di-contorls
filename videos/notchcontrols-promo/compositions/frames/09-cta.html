<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- head is metadata only; the runtime clones <template> contents -->
  </head>
  <body>
    <template>
      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>

      <style>
        @font-face {
          font-family: "Inter";
          src: url("assets/fonts/Inter-Black.woff2") format("woff2");
          font-weight: 800;
          font-display: block;
        }

        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          font-family: "Inter", system-ui, sans-serif;
          color: #ffffff;
        }

        /* full-bleed ground lives on a clip, never on #root */
        .cta09-bg {
          position: absolute;
          inset: 0;
          background: #000000;
        }

        /* content stage = the top-83% keep-out-safe region (captions own y >= 900) */
        .cta09-stage {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          height: 900px;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
        }

        /* Scene 1 — "free." / "open source." hard-cut beats */
        .cta09-beatline {
          font-size: 210px;
          font-weight: 800;
          letter-spacing: -0.04em;
          line-height: 0.9;
          text-transform: lowercase;
          white-space: nowrap;
          color: rgba(255, 255, 255, 0.92);
          will-change: transform;
        }

        /* Scene 2 — island glyph + wordmark lockup */
        .cta09-island {
          width: 132px;
          height: 36px;
          margin-bottom: 34px;
          background: #1a1918;
          border: 1px solid #282726;
          border-radius: 18px; /* recreated device UI — pill radius is product-semantic */
          display: flex;
          align-items: center;
          justify-content: center;
          will-change: transform, opacity;
        }
        .cta09-mic-dot {
          width: 9px;
          height: 9px;
          border-radius: 50%;
          background: #ff9f0a;
        }
        .cta09-word {
          font-size: 150px;
          font-weight: 800;
          letter-spacing: -0.04em;
          line-height: 0.95;
          text-transform: lowercase;
          white-space: nowrap;
          color: #ffffff;
          will-change: transform, filter, opacity;
        }

        /* Scene 3 — mono tagline + typed URL */
        .cta09-tagline {
          margin-top: 42px;
          font-family: ui-monospace, monospace;
          font-size: 24px;
          font-weight: 500;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: #ffffff;
          will-change: transform, opacity;
        }
        .cta09-url-wrap {
          margin-top: 30px;
          display: inline-flex;
          align-items: baseline;
          justify-content: flex-start;
          /* fixed measure >= full URL width so the line never re-centers while typing */
          min-width: 1020px;
          white-space: pre;
        }
        .cta09-url-text {
          font-family: ui-monospace, monospace;
          font-size: 46px;
          font-weight: 500;
          color: #ff9f0a;
          white-space: pre;
        }
        .cta09-caret {
          display: inline-block;
          width: 12px;
          height: 46px;
          margin-left: 8px;
          vertical-align: -5px;
          background: #ff9f0a;
          opacity: 0;
        }
      </style>

      <div
        id="root"
        data-composition-id="09-cta"
        data-width="1920"
        data-height="1080"
        data-duration="4.16"
      >
        <!-- ground -->
        <div
          class="clip cta09-bg"
          data-start="0"
          data-duration="4.16"
          data-track-index="0"
        ></div>

        <!-- Scene 1: value beats swap in place, then hard-cut away -->
        <div
          class="clip cta09-stage"
          data-start="0"
          data-duration="1.4"
          data-track-index="1"
        >
          <div class="cta09-beatline" id="cta09-beatline"></div>
        </div>

        <!-- Scenes 2 + 3: island glyph, wordmark slam, tagline, typed URL, still hold -->
        <div
          class="clip cta09-stage"
          data-start="1.4"
          data-duration="2.76"
          data-track-index="2"
        >
          <div class="cta09-island" id="cta09-island">
            <div class="cta09-mic-dot"></div>
          </div>
          <div class="cta09-word" id="cta09-word">notchcontrols</div>
          <div class="cta09-tagline" id="cta09-tagline">your notch, on duty</div>
          <div class="cta09-url-wrap">
            <span class="cta09-url-text" id="cta09-url-text"></span
            ><span class="cta09-caret" id="cta09-caret"></span>
          </div>
        </div>
      </div>

      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        const D = 4.16; // synced VO duration — authoritative
        // one beat grid drives everything (kinetic-beat-slam):
        // free · open source · wordmark slam · glyph seat · tagline · url type-on
        const BEATS = [0.06, 0.72, 1.42, 1.56, 2.0, 2.15];
        const TYPE_START = BEATS[5];
        const TYPE_END = 2.68; // -> still hold of ~1.48s to the end
        const URL = "github.com/pratiksardar/di-contorls";

        // ---- Scene 1: discrete-text-sequence — whole-line hard cuts, no fades ----
        const SEQ = [
          { t: 0, text: "" },
          { t: BEATS[0], text: "free." },
          { t: BEATS[1], text: "open source." },
        ];
        const beatEl = document.getElementById("cta09-beatline");
        const beatDriver = { t: 0 };
        tl.to(
          beatDriver,
          {
            t: 1.4,
            duration: 1.4,
            ease: "none",
            onUpdate: () => {
              let s = "";
              for (let i = SEQ.length - 1; i >= 0; i--) {
                if (beatDriver.t >= SEQ[i].t) {
                  s = SEQ[i].text;
                  break;
                }
              }
              beatEl.textContent = s;
            },
          },
          0,
        );
        // each landed beat settles on a long tail (smooth, no bounce)
        tl.fromTo(
          "#cta09-beatline",
          { scale: 1.06 },
          { scale: 1, duration: 0.55, ease: "power3.out" },
          BEATS[0],
        );
        tl.fromTo(
          "#cta09-beatline",
          { scale: 1.06 },
          { scale: 1, duration: 0.55, ease: "power3.out" },
          BEATS[1],
        );

        // ---- Scene 2: kinetic-beat-slam finale — wordmark slam + glyph seat ----
        tl.fromTo(
          "#cta09-word",
          { opacity: 0, scale: 1.45, filter: "blur(14px)" },
          {
            opacity: 1,
            scale: 1,
            filter: "blur(0px)",
            duration: 0.5,
            ease: "power4.out",
          },
          BEATS[2],
        );
        tl.fromTo(
          "#cta09-island",
          { opacity: 0, y: -26 },
          { opacity: 1, y: 0, duration: 0.45, ease: "expo.out" },
          BEATS[3],
        );

        // ---- Scene 3: tagline fade-up, then URL types on behind a caret ----
        tl.fromTo(
          "#cta09-tagline",
          { opacity: 0, y: 16 },
          { opacity: 0.6, y: 0, duration: 0.45, ease: "power3.out" },
          BEATS[4],
        );

        // discrete-text-sequence (smooth slice) + context-sensitive-cursor:
        // one driver, pure function of t — text slice, caret solid while typing,
        // deterministic sin blink through the final hold (2 whole cycles, ends on).
        const urlEl = document.getElementById("cta09-url-text");
        const caretEl = document.getElementById("cta09-caret");
        const BLINK_PERIOD = (D - TYPE_END) / 2; // whole cycles across the hold
        const urlDriver = { t: 0 };
        tl.to(
          urlDriver,
          {
            t: D,
            duration: D,
            ease: "none",
            onUpdate: () => {
              const t = urlDriver.t;
              if (t < TYPE_START) {
                urlEl.textContent = "";
                caretEl.style.opacity = "0";
                return;
              }
              const p = Math.min(1, (t - TYPE_START) / (TYPE_END - TYPE_START));
              const eased = p * p * (3 - 2 * p); // smoothstep ~ power1.inOut
              urlEl.textContent = URL.substring(0, Math.floor(URL.length * eased));
              caretEl.style.opacity =
                t < TYPE_END
                  ? "1"
                  : Math.sin((2 * Math.PI * (t - TYPE_END)) / BLINK_PERIOD) >= 0
                    ? "1"
                    : "0";
            },
          },
          0,
        );

        window.__timelines["09-cta"] = tl;
      </script>
    </template>
  </body>
</html>
