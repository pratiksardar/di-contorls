        .m7-lines {

      <div id="root" data-composition-id="07-mute" data-width="1920" data-height="1080" data-duration="4.383">
        <!-- full-bleed ground on its own clip layer (never on #root) -->
        <div class="m7-bg clip" data-start="0" data-duration="4.383" data-track-index="0"></div>

        <!-- single full-duration stage; all reveals are GSAP-paced -->
        <div class="m7-stage clip" id="m7-stage" data-start="0" data-duration="4.383" data-track-index="1">
          <!-- hairlines behind the pills/island -->
          <svg class="m7-lines" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
            <path id="m7-line-1" d="M850 398 C850 500, 560 510, 560 640" />
            <path id="m7-line-2" d="M850 398 C850 520, 960 510, 960 640" />
            <path id="m7-line-3" d="M850 398 C850 490, 1360 500, 1360 640" />
          </svg>

          <!-- recreated island strip -->
          <div class="m7-glow" id="m7-glow"></div>
          <div class="m7-island" id="m7-island">
            <div class="m7-glyph m7-glyph-mic" id="m7-glyph-mic">
              <!-- mic, live (white) -->
              <svg id="m7-mic-on" viewBox="0 0 32 32">
                <g fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="2.4" stroke-linecap="round">
                  <rect x="12" y="4" width="8" height="15" rx="4" fill="rgba(255,255,255,0.92)" stroke="none" />

              </svg>
              <!-- mic, muted (red slash) -->
              <svg id="m7-mic-off" class="m7-mic-off" viewBox="0 0 32 32">
                <g fill="none" stroke="#ff453a" stroke-width="2.4" stroke-linecap="round">
                  <rect x="12" y="4" width="8" height="15" rx="4" fill="#ff453a" stroke="none" />
                  <path d="M8 14v1a8 8 0 0 0 16 0v-1" />
                  <path d="M16 23v4" />
                  <path d="M11.5 27h9" />

                </g>

              <svg viewBox="0 0 32 32">
                <g fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

          <!-- accent marker circle around the mic glyph -->

          <div class="m7-ripple" id="m7-ripple"></div>

          <div class="m7-cursor" id="m7-cursor">
            <svg width="44" height="44" viewBox="0 0 24 24">
              <path d="M5 3L19 12L12 13L9 20L5 3Z" fill="#ffffff" stroke="#000000" stroke-width="1.5" />
            </svg>
          </div>

          <!-- app pills: meet · slack · zoom -->
          <div class="m7-pills">
            <div class="m7-pill" id="m7-pill-1">
              <div class="pn"><span class="m7-dot"></span><span class="m7-plabel">meet</span><span class="m7-pstate">live</span></div>
              <div class="pm">
                <svg class="m7-slash-mini" viewBox="0 0 32 32">
                  <g fill="none" stroke="#ff453a" stroke-width="2.6" stroke-linecap="round">
                    <rect x="12" y="4" width="8" height="15" rx="4" fill="#ff453a" stroke="none" />
                    <path d="M8 14v1a8 8 0 0 0 16 0v-1" />

            <div class="m7-pill" id="m7-pill-2">

              <div class="pm">

            <div class="m7-pill" id="m7-pill-3">
              <div class="pn"><span class="m7-dot"></span><span class="m7-plabel">zoom</span><span class="m7-pstate">live</span></div>
              <div class="pm">
                <svg class="m7-slash-mini" viewBox="0 0 32 32">
                  <g fill="none" stroke="#ff453a" stroke-width="2.6" stroke-linecap="round">
                    <rect x="12" y="4" width="8" height="15" rx="4" fill="#ff453a" stroke="none" />

      <script>
        window.__timelines = window.__timelines || {};

        // svg-path-draw: measure real geometry, hide strokes behind dashoffset
        ["m7-line-1", "m7-line-2", "m7-line-3"].forEach(function (id) {
          var p = document.getElementById(id);
          var len = p.getTotalLength();
          p.style.strokeDasharray = String(len);
          p.style.strokeDashoffset = String(len);
        });

        var tl = gsap.timeline({ paused: true });

        // -- timing (scene windows scaled 6.0s → 3.883s synced duration) --
        var CLICK_AT = 1.95; // press start ("one click" cue)
        var PRESS_DUR = 0.08; // linear compression (press-release-spring)
        var RELEASE_AT = CLICK_AT + PRESS_DUR; // 2.03 — flip + ripple fire here

        // Scene 1 (0–1.17) — island close-up seats, marker circles the mic
        tl.fromTo(
          "#m7-island",
          { opacity: 0, y: -24, scale: 1.04 },
          { opacity: 1, y: 0, scale: 1, duration: 0.5, ease: "power3.out" },
          0.02
        );
        // macro camera: gentle push toward the mic glyph through the click…
        tl.fromTo(
          "#m7-stage",
          { scale: 1, transformOrigin: "850px 335px" },
          { scale: 1.05, duration: 1.65, ease: "power2.inOut", transformOrigin: "850px 335px" },
          0.3
        );
        // marker circle (css-marker-patterns circle mode; smooth settle, no overshoot)
        tl.fromTo(
          "#m7-marker",
          { opacity: 0, scale: 0, rotation: -4 },
          { opacity: 1, scale: 1, rotation: -4, duration: 0.55, ease: "power3.out" },
          0.6
        );

        // Scene 2 (1.17–2.2) — cursor arcs in, clicks, glyph hard-flips to red
        tl.fromTo(
          "#m7-cursor",
          { x: 430, y: 330, opacity: 0, transformOrigin: "6px 5px" },
          { x: 0, y: 0, opacity: 1, duration: 0.6, ease: "power3.out", transformOrigin: "6px 5px" },
          1.1
        );
        // press: linear compression, cursor deeper than target
        tl.to("#m7-cursor", { scale: 0.85, duration: PRESS_DUR, ease: "power1.in" }, CLICK_AT);
        tl.to("#m7-glyph-mic", { scale: 0.92, duration: PRESS_DUR, ease: "power1.in", transformOrigin: "50% 50%" }, CLICK_AT);
        // release: smooth long-tail recovery (no overshoot per direction)
        tl.to("#m7-cursor", { scale: 1, duration: 0.35, ease: "power3.out" }, RELEASE_AT);
        tl.to("#m7-glyph-mic", { scale: 1, duration: 0.35, ease: "power3.out" }, RELEASE_AT);
        // hard cut: white mic → red mic-slash
        tl.set("#m7-mic-on", { opacity: 0 }, RELEASE_AT);
        tl.set("#m7-mic-off", { opacity: 1 }, RELEASE_AT);
        // single ripple ring from the click point (cursor-click-ripple, elegant single-ring variant)
        tl.fromTo(
          "#m7-ripple",
          { scale: 0, opacity: 0.9 },
          { scale: 3, opacity: 0, duration: 0.6, ease: "expo.out", immediateRender: false },
          RELEASE_AT
        );
        // marker did its job — the red state takes over
        tl.to("#m7-marker", { opacity: 0, duration: 0.25, ease: "power2.out" }, RELEASE_AT);
        tl.fromTo(
          "#m7-glow",
          { opacity: 0 },
          { opacity: 0.35, duration: 0.4, ease: "power2.out" },
          RELEASE_AT
        );
        // …camera eases back out as the consequence fans wider (ends before the hold)
        tl.to("#m7-stage", { scale: 1, duration: 0.65, ease: "power2.inOut" }, 2.2);

        // Scene 3 (2.2–3.883) — pills cascade in, hairlines draw, every app flips to muted
        var pills = ["#m7-pill-1", "#m7-pill-2", "#m7-pill-3"];
        pills.forEach(function (sel, i) {
          tl.fromTo(
            sel,
            { opacity: 0, y: 26 },
            { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" },
            2.35 + i * 0.14
          );
        });
        // red hairlines draw island → pills (stagger ~ continuous motion)
        ["#m7-line-1", "#m7-line-2", "#m7-line-3"].forEach(function (sel, i) {
          tl.to(sel, { strokeDashoffset: 0, duration: 0.32, ease: "power2.out" }, 2.6 + i * 0.12);
        });
        // fast muted cascade (dynamic-content-sequencing beat), one flip per tick
        pills.forEach(function (sel, i) {
          var at = 2.95 + i * 0.12;
          tl.fromTo(sel + " .pn", { opacity: 1 }, { opacity: 0, duration: 0.15, ease: "power1.inOut" }, at);
          tl.fromTo(sel + " .pm", { opacity: 0 }, { opacity: 1, duration: 0.15, ease: "power1.inOut" }, at);
          tl.to(
            sel,
            { borderColor: "rgba(255,69,58,0.55)", backgroundColor: "#231111", duration: 0.2, ease: "power1.inOut" },
            at
          );
        });
        // hold from ~3.35 — the red state reads clean to the cut (no exit; not the final frame)

        window.__timelines["07-mute"] = tl;
      </script>
