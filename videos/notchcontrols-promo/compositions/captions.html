<style>
  #captions-root {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .caption-layer {
    position: absolute;
    inset: 0;
    z-index: 20;
    pointer-events: none;
  }
  /* the keep-out band, from captionBand(H) — frame content stays above it */
  .caption-stage {
    position: absolute;
    left: 0;
    right: 0;
    top: var(--cap-band-top, 900px);
    height: var(--cap-band-height, 180px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .caption-group {
    /* every group is absolutely stacked over the SAME band — exactly one shown at a
       time via opacity. Must be absolute: in-flow groups would lay out side-by-side. */
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
  }

  /* THE ink-black plate — single 1px fire-orange hairline (broadside's lone accent),
     SHARP corners (0 radius), NO shadow (the plane is flat) */
  .caption-pill {
    max-width: 80%;
    padding: 18px 44px 22px;
    background: var(--cap-ink, #111111);
    border: 1px solid var(--cap-accent, #e85d26);
    border-radius: 0;
  }
  .caption-line {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.04em 0.3em;
    font-family: "Inter", system-ui, sans-serif;
    font-weight: 900;
    font-size: clamp(38px, 4.2vw, 56px);
    line-height: 1.02;
    letter-spacing: -0.03em;
    text-transform: lowercase;
  }

  /* upcoming — faint cream, no block (massive lowercase Barlow 900 as graphic primitive) */
  .caption-word {
    display: inline-block;
    padding: 0 0.08em;
    color: rgba(255,255,255,0.62);
  }
  /* current word — THE register flip: a hard flat fire-orange block (box-shadow spread =
     a sharp rectangle w/o layout shift; no blur), ink reading on top — the lone accent */
  .caption-word.is-active {
    color: var(--cap-ink, #111111);
    background: var(--cap-accent, #e85d26);
    box-shadow: 0 0 0 0.06em var(--cap-accent, #e85d26);
  }
  /* already spoken — solid cream, the orange block cleared */
  .caption-word.is-spoken {
    color: var(--cap-canvas, #f0ece5);
    background: transparent;
    box-shadow: none;
  }

  /* optional per-word accents (dormant until a word-classer tags them) */
  /* brand / key term — fire-orange ink, the cream-on-ink register's only inflection */
  .caption-word.cap-brand {
    color: var(--cap-accent, #e85d26);
  }
  /* numerals / data — the IBM Plex Mono chrome voice, uppercase + tracked, recessed */
  .caption-word.cap-num {
    font-family: "Inter", ui-monospace, monospace;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.82);
  }
  /* emphasis — a fire-orange hairline underline (no second hue; the lone accent again) */
  .caption-word.cap-cta {
    text-decoration: underline;
    text-decoration-thickness: 2px;
    text-decoration-color: var(--cap-accent-2, #e85d26);
    text-underline-offset: 0.1em;
  }

  @media (max-aspect-ratio: 9/16) {
    .caption-pill {
      max-width: 92%;
    }
    .caption-line {
      font-size: clamp(32px, 5.2vw, 46px);
    }
  }
