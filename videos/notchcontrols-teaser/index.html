<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>notchcontrols — teaser</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* ---- local fonts (deterministic render: no CDN fetch) ---- */
      @font-face {
        font-family: "Inter";
        src: url("assets/fonts/Inter-Regular.woff2") format("woff2");
        font-weight: 400;
        font-display: block;
      }
      @font-face {
        font-family: "Inter";
        src: url("assets/fonts/Inter-Medium.woff2") format("woff2");
        font-weight: 500;
        font-display: block;
      }
      @font-face {
        font-family: "Inter";
        src: url("assets/fonts/Inter-SemiBold.woff2") format("woff2");
        font-weight: 600;
        font-display: block;
      }
      @font-face {
        font-family: "Inter";
        src: url("assets/fonts/Inter-Bold.woff2") format("woff2");
        font-weight: 700;
        font-display: block;
      }
      @font-face {
        font-family: "Inter";
        src: url("assets/fonts/Inter-Black.woff2") format("woff2");
        font-weight: 900;
        font-display: block;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }

      /* ---- palette (frame.md broadside dark register) ---- */
      :root {
        --ink: #000000;
        --ink-alt: #1a1918;
        --orange: #ff9f0a;
        --cream: #ffffff;
        --hint: #504d48;
        --hairline: #282726;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        container-type: size;
        font-family: "Inter", sans-serif;
      }
      /* full-bleed ground on a child, never on the root (producer can drop root bg) */
      #bg {
        position: absolute;
        inset: 0;
        background: var(--ink);
      }

      /* ---- statement scenes (s1–s3) ---- */
      .scene {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        padding: 0 5.5cqw;
      }
      .scene.anchor-right {
        justify-content: flex-end;
        text-align: right;
      }
      .line {
        font-size: 7.5cqw;
        font-weight: 900;
        letter-spacing: -0.03em;
        line-height: 0.95;
        color: var(--cream);
        max-width: 78cqw;
      }
      .line em {
        font-style: normal;
        display: inline-block; /* transformable */
        color: inherit; /* inked orange on the beat, via timeline */
      }

      /* ---- s4 island sting (radius allowed here only: hardware geometry) ---- */
      #s4-island {
        position: absolute;
        inset: 0;
      }
      #s4-assembly {
        position: absolute;
        inset: 0;
        transform-origin: 960px 112px; /* island pill center */
      }
      #s4-bar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 64px;
        background: var(--ink-alt);
        border-bottom: 1px solid var(--hairline);
      }
      #s4-notch {
        position: absolute;
        top: 0;
        left: 50%;
        margin-left: -180px;
        width: 360px;
        height: 64px;
        background: var(--ink);
        border: 1px solid var(--hairline);
        border-top: none;
        border-radius: 0 0 14px 14px;
      }
      #s4-pill {
        position: absolute;
        top: 76px;
        left: 50%;
        margin-left: -150px;
        width: 300px;
        height: 72px;
        background: var(--ink);
        border: 1px solid var(--hairline);
        border-radius: 36px;
      }
      #s4-dot {
        position: absolute;
        left: 20px;
        top: 50%;
        margin-top: -7px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--orange);
      }

      /* ---- s5 reveal ---- */
      #s5-reveal,
      #s6-outro {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 5.5cqw;
      }
      .stack {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      #s5-word {
        font-size: 11cqw;
        font-weight: 900;
        letter-spacing: -0.04em;
        line-height: 0.9;
        color: var(--cream);
      }
      #s5-rule {
        width: 36px;
        height: 2px;
        background: var(--orange);
        margin: 1.6cqw 0 2cqw;
      }
      #s5-tag {
        font-size: 2.6cqw;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--cream);
      }
      #s5-tag .w {
        display: inline-block;
      }
      #s5-tag .on {
        color: var(--orange);
      }

      /* ---- s6 outro ---- */
      #s6-head {
        font-size: 4.5cqw;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.1;
        color: var(--cream);
      }
      #s6-head em {
        font-style: normal;
        color: var(--orange);
      }
      #s6-hr {
        width: 36cqw;
        height: 1px;
        background: var(--hairline);
        margin: 2cqw 0;
      }
      #s6-url {
        font-family: "IBM Plex Mono", "SF Mono", Menlo, monospace;
        font-size: 1.5cqw;
        font-weight: 500;
        letter-spacing: 0.14em;
        color: #b5b1aa; /* CTA must clear WCAG 3:1 on ink — hint gray sat at 2.5:1 */
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="15"
      data-fps="30"
      data-width="1920"
      data-height="1080"
    >
      <div id="bg"></div>

      <!-- s1 · hook · 0.00–1.70 -->
      <div id="s1-hook" class="clip scene" data-start="0" data-duration="1.7" data-track-index="1">
        <h1 id="s1-line" class="line">your agents are <em id="s1-em">waiting</em>.</h1>
      </div>

      <!-- s2 · build · 1.70–3.40 (mirrored anchor) -->
      <div
        id="s2-build"
        class="clip scene anchor-right"
        data-start="1.7"
        data-duration="1.7"
        data-track-index="2"
      >
        <h1 id="s2-line" class="line">you might be <em id="s2-em">muted</em>.</h1>
      </div>

      <!-- s3 · build · 3.40–5.10 (hard cut out) -->
      <div id="s3-build" class="clip scene" data-start="3.4" data-duration="1.7" data-track-index="1">
        <h1 id="s3-line" class="line">your script is <em id="s3-em">showing</em>.</h1>
      </div>

      <!-- s4 · island sting · 5.10–10.40 (hand-authored shape recreation) -->
      <div
        id="s4-island"
        class="clip"
        data-start="5.1"
        data-duration="5.3"
        data-track-index="2"
        data-layout-allow-overflow="true"
      >
        <div id="s4-assembly">
          <div id="s4-bar">
            <div id="s4-notch"></div>
          </div>
          <div id="s4-pill">
            <div id="s4-dot"></div>
          </div>
        </div>
      </div>

      <!-- s5 · reveal · 10.40–13.00 -->
      <div id="s5-reveal" class="clip" data-start="10.4" data-duration="2.6" data-track-index="1">
        <div id="s5-stack" class="stack">
          <h1 id="s5-word">notchcontrols</h1>
          <div id="s5-rule"></div>
          <p id="s5-tag">
            <span class="w">your</span>
            <span class="w">notch,</span>
            <span class="w on">on</span>
            <span class="w on">duty</span>
          </p>
        </div>
      </div>

      <!-- s6 · outro · 13.00–15.00 -->
      <div id="s6-outro" class="clip" data-start="13" data-duration="2" data-track-index="2">
        <div id="s6-stack" class="stack">
          <h2 id="s6-head"><em>free</em> &amp; open source</h2>
          <div id="s6-hr"></div>
          <!-- URL is intentionally 'di-contorls' — verbatim, do not correct -->
          <div id="s6-url">github.com/pratiksardar/di-contorls</div>
        </div>
      </div>

      <!-- ---- audio (framework-owned, direct root children) ---- -->
      <audio id="au-voice" src="assets/voice/stinger.wav" data-start="10.4" data-duration="2.86" data-track-index="10" data-volume="1"></audio>

      <audio id="au-slam1" src="assets/sfx/impact-bass-1.mp3" data-start="0" data-duration="2.12" data-track-index="11" data-volume="0.9"></audio>
      <audio id="au-slam3" src="assets/sfx/impact-bass-1.mp3" data-start="3.4" data-duration="2.12" data-track-index="11" data-volume="0.9"></audio>
      <audio id="au-slam-wordmark" src="assets/sfx/impact-bass-2.mp3" data-start="10.4" data-duration="2.59" data-track-index="11" data-volume="0.9"></audio>

      <audio id="au-slam2" src="assets/sfx/impact-bass-2.mp3" data-start="1.7" data-duration="2.59" data-track-index="12" data-volume="0.9"></audio>
      <audio id="au-pop" src="assets/sfx/pop.mp3" data-start="5.7" data-duration="0.72" data-track-index="12" data-volume="0.85"></audio>
      <audio id="au-chime" src="assets/sfx/chime.mp3" data-start="11.4" data-duration="2.54" data-track-index="12" data-volume="0.45"></audio>

      <audio id="au-glitch" src="assets/sfx/glitch-1.mp3" data-start="4.1" data-duration="1" data-track-index="13" data-volume="0.8"></audio>
      <audio id="au-click" src="assets/sfx/click.mp3" data-start="6.4" data-duration="0.37" data-track-index="13" data-volume="0.75"></audio>
      <audio id="au-click-soft" src="assets/sfx/click-soft.mp3" data-start="13.6" data-duration="0.37" data-track-index="13" data-volume="0.7"></audio>

      <audio id="au-whoosh-in" src="assets/sfx/whoosh.mp3" data-start="5" data-duration="0.57" data-track-index="14" data-volume="0.85"></audio>
      <!-- pre-trimmed riser tail: peak lands exactly at 10.40 (wordmark slam) -->
      <audio id="au-riser" src="assets/sfx/riser-tail.mp3" data-start="6.4" data-duration="4" data-track-index="14" data-volume="0.9"></audio>
      <audio id="au-whoosh-out" src="assets/sfx/whoosh.mp3" data-start="12.9" data-duration="0.57" data-track-index="14" data-volume="0.27"></audio>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const F = 1 / 30; // one frame at 30fps

      /* ================= s1 · hook (beats 0.00, 0.55) ================= */
      // slam from above onto impact-bass-1
      tl.fromTo(
        "#s1-line",
        { y: -300, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.3, ease: "power4.out" },
        0
      );
      // 3-frame shake on land (≤8px)
      tl.to(
        "#s1-line",
        {
          keyframes: [
            { x: -8, duration: F },
            { x: 6, duration: F },
            { x: 0, duration: F },
          ],
          ease: "none",
        },
        0.3
      );
      // 'waiting' inks orange + single pulse on the 0.55 beat
      tl.to("#s1-em", { color: "#FF9F0A", duration: 0.12, ease: "none" }, 0.55);
      tl.to(
        "#s1-em",
        { scale: 1.1, duration: 0.12, ease: "sine.inOut", yoyo: true, repeat: 1 },
        0.55
      );
      // exit up under the next slam
      tl.to("#s1-line", { y: -80, autoAlpha: 0, duration: 0.15, ease: "power2.in" }, 1.55);
      tl.set("#s1-line", { autoAlpha: 0 }, 1.7);

      /* ================= s2 · build (beats 1.70, 2.25) ================= */
      // slam from below (alternate direction), right-anchored
      tl.fromTo(
        "#s2-line",
        { y: 300, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.3, ease: "power4.out" },
        1.7
      );
      tl.to(
        "#s2-line",
        {
          keyframes: [
            { x: 8, duration: F },
            { x: -6, duration: F },
            { x: 0, duration: F },
          ],
          ease: "none",
        },
        2.0
      );
      // 'muted' inks orange, then a 2-frame mic-cut flicker
      tl.to("#s2-em", { color: "#FF9F0A", duration: 0.1, ease: "none" }, 2.25);
      tl.to(
        "#s2-em",
        {
          keyframes: [
            { opacity: 0.3, duration: F },
            { opacity: 1, duration: F },
          ],
          ease: "none",
        },
        2.3
      );
      tl.to("#s2-line", { y: 80, autoAlpha: 0, duration: 0.15, ease: "power2.in" }, 3.25);
      tl.set("#s2-line", { autoAlpha: 0 }, 3.4);

      /* ================= s3 · build (beats 3.40, 4.10) ================= */
      tl.fromTo(
        "#s3-line",
        { y: -300, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.3, ease: "power4.out" },
        3.4
      );
      tl.to(
        "#s3-line",
        {
          keyframes: [
            { x: -8, duration: F },
            { x: 6, duration: F },
            { x: 0, duration: F },
          ],
          ease: "none",
        },
        3.7
      );
      tl.to("#s3-em", { color: "#FF9F0A", duration: 0.12, ease: "none" }, 3.75);
      // 4.10 glitch: 6-frame x-jitter with a single-hue split ghost (orange only — palette discipline)
      tl.to(
        "#s3-line",
        { textShadow: "-6px 0 rgba(255,159,10,0.55)", duration: 0.05, ease: "none" },
        4.1
      );
      tl.to(
        "#s3-line",
        {
          keyframes: [
            { x: -6, duration: F },
            { x: 6, duration: F },
            { x: -6, duration: F },
            { x: 5, duration: F },
            { x: -3, duration: F },
            { x: 0, duration: F },
          ],
          ease: "none",
        },
        4.1
      );
      tl.to(
        "#s3-line",
        { textShadow: "0px 0 rgba(255,159,10,0)", duration: 0.05, ease: "none" },
        4.28
      );
      // no exit tween — hard cut at 5.10 (clip window ends under the whoosh)

      /* ============ s4 · island sting (beats 5.10, 5.70, 6.40, 10.40) ============ */
      // 5.10 whoosh: menu-bar strip descends
      tl.fromTo("#s4-bar", { y: -70 }, { y: 0, duration: 0.4, ease: "power4.out" }, 5.1);
      // 5.70 pop: island pill grows out from beneath the notch (power3.out — no back/elastic)
      tl.fromTo(
        "#s4-pill",
        { scale: 0, autoAlpha: 0, transformOrigin: "50% 0%" },
        { scale: 1, autoAlpha: 1, duration: 0.35, ease: "power3.out" },
        5.7
      );
      // 6.40 click: the single orange dot — only color in the frame
      tl.fromTo("#s4-dot", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.2, ease: "power2.out" }, 6.4);
      // 6.40→10.40 riser: held breath creeping in, then the push accelerates and swallows the frame.
      // Readability window honored: 6.75→8.5 the assembly only breathes (scale 1→1.15).
      tl.to("#s4-assembly", { scale: 1.15, duration: 2.1, ease: "power1.in" }, 6.4);
      tl.to("#s4-assembly", { scale: 7, y: 428, duration: 1.88, ease: "power2.in" }, 8.5);
      // dot blooms softly away in the last half second
      tl.to("#s4-dot", { scale: 2, autoAlpha: 0, duration: 0.5, ease: "power2.in" }, 9.9);
      // hairlines dissolve to pure black, primed for the wordmark slam
      tl.set("#s4-dot", { autoAlpha: 0 }, 10.4);
      tl.set("#s4-assembly", { autoAlpha: 0 }, 10.4);
      tl.to("#s4-assembly", { autoAlpha: 0, duration: 0.33, ease: "power2.in" }, 10.05);

      /* ================= s5 · reveal (beats 10.40, 10.80, 11.40) ================= */
      // wordmark slam locked to impact-bass-2 + the voice stinger's first word
      tl.fromTo(
        "#s5-word",
        { y: -300, scale: 1.15, autoAlpha: 0 },
        { y: 0, scale: 1, autoAlpha: 1, duration: 0.35, ease: "power4.out" },
        10.4
      );
      tl.to(
        "#s5-word",
        {
          keyframes: [
            { x: -10, duration: F },
            { x: 8, duration: F },
            { x: 0, duration: F },
          ],
          ease: "none",
        },
        10.75
      );
      // orange rule stub sweeps in beneath
      tl.fromTo(
        "#s5-rule",
        { scaleX: 0, transformOrigin: "left center" },
        { scaleX: 1, duration: 0.45, ease: "expo.out" },
        10.8
      );
      // tagline word-reveal exactly as the voice says the phrase
      tl.fromTo(
        "#s5-tag .w",
        { autoAlpha: 0, y: 24 },
        { autoAlpha: 1, y: 0, duration: 0.4, ease: "power3.out", stagger: 0.09 },
        11.4
      );
      // held breath on the wordmark
      tl.to("#s5-word", { scale: 1.015, duration: 1.45, ease: "sine.inOut" }, 11.4);
      // soft exit into the outro
      tl.to("#s5-stack", { autoAlpha: 0, duration: 0.15, ease: "power2.in" }, 12.85);
      tl.set("#s5-stack", { autoAlpha: 0 }, 13.0);

      /* ================= s6 · outro (beats 13.00, 13.60) ================= */
      // soft landing — the percussion is over
      tl.fromTo(
        "#s6-head",
        { y: 120, autoAlpha: 0 },
        { y: 0, autoAlpha: 1, duration: 0.4, ease: "power4.out" },
        13.0
      );
      // 13.60 click-soft: hairline draws across, URL resolves beneath
      tl.fromTo(
        "#s6-hr",
        { scaleX: 0, transformOrigin: "left center" },
        { scaleX: 1, duration: 0.5, ease: "expo.out" },
        13.6
      );
      tl.fromTo("#s6-url", { autoAlpha: 0 }, { autoAlpha: 1, duration: 0.4, ease: "power2.out" }, 13.6);
      // holds still to 15.00 — end on the URL

      /* ---- audio ducking (runtime probes timeline volume keyframes) ---- */
      // glitch-1 is clipped to 1.0s; fade its last 0.2s to avoid a hard tail cut
      tl.to("#au-glitch", { volume: 0, duration: 0.2, ease: "none" }, 4.9);

      tl.seek(0);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
