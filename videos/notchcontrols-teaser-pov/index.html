<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>notchcontrols — POV teaser</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* ---- local fonts (deterministic render: no CDN fetch) ---- */
      @font-face {
        font-family: "Bricolage Grotesque";
        src: url("assets/fonts/BricolageGrotesque-800.woff2") format("woff2");
        font-weight: 800;
        font-display: block;
      }
      @font-face {
        font-family: "Inter";
        src: url("assets/fonts/Inter-Medium.woff2") format("woff2");
        font-weight: 500;
        font-display: block;
      }
      @font-face {
        font-family: "Inter";
        src: url("assets/fonts/Inter-SemiBold.woff2") format("woff2");
        font-weight: 600;
        font-display: block;
      }
      @font-face {
        font-family: "Inter";
        src: url("assets/fonts/Inter-Bold.woff2") format("woff2");
        font-weight: 700;
        font-display: block;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #fafaf7;
      }

      /* ---- palette ---- */
      :root {
        --paper: #fafaf7;
        --ink: #14120f;
        --lilac: #b79cff;
        --lilac-deep: #6b48d6; /* text-grade lilac (≥3:1 on paper) */
        --orange: #ff9f0a;
        --red: #ff3b30;
        --green: #32d74b;
        --dim: rgba(250, 250, 247, 0.34);
        --hw: #000000; /* island is ALWAYS pure black */
      }

      #root {
        position: relative;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        font-family: "Bricolage Grotesque", "Inter", sans-serif;
      }
      #bg {
        position: absolute;
        inset: 0;
        background: var(--paper);
      }

      /* ---- persistent hardware layer (island + dashboard), POV camera drifts around it ---- */
      #persist {
        position: absolute;
        inset: 0;
      }
      #world {
        position: absolute;
        inset: 0;
        transform-origin: 540px 164px; /* island pill center — POV zoom anchors here */
      }
      #island {
        position: absolute;
        top: 110px;
        left: 50%;
        margin-left: -200px;
        width: 400px;
        height: 108px;
        background: var(--hw);
        border-radius: 54px;
        box-shadow: 0 18px 44px rgba(20, 18, 15, 0.22);
      }
      #mic-dot {
        position: absolute;
        left: 42px;
        top: 50%;
        margin-top: -13px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--orange);
      }
      #agent-dot {
        position: absolute;
        right: 42px;
        top: 50%;
        margin-top: -13px;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--green);
      }
      .ripple {
        position: absolute;
        right: 25px;
        top: 50%;
        margin-top: -30px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 4px solid var(--green);
      }
      .ripple-red {
        position: absolute;
        left: 25px;
        top: 50%;
        margin-top: -30px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 4px solid var(--red);
      }

      /* ---- fleet dashboard (expands down from the island) ---- */
      #dash {
        position: absolute;
        top: 236px;
        left: 50%;
        margin-left: -320px;
        width: 640px;
        height: 470px;
        background: var(--hw);
        border-radius: 40px;
        transform-origin: 50% 0%;
        box-shadow: 0 26px 60px rgba(20, 18, 15, 0.26);
        padding: 40px 44px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      #dash-label {
        font-family: "Inter", sans-serif;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 0.24em;
        color: var(--lilac);
      }
      .row {
        display: flex;
        align-items: center;
        gap: 26px;
        height: 96px;
        border-radius: 24px;
        background: rgba(250, 250, 247, 0.06);
        padding: 0 30px;
      }
      .row .st {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        flex: 0 0 auto;
      }
      .row .st.done {
        background: var(--green);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--hw);
        font-family: "Inter", sans-serif;
        font-weight: 700;
        font-size: 22px;
      }
      .row .st.work {
        background: var(--green);
      }
      .row .st.idle {
        background: transparent;
        border: 3px solid var(--dim);
      }
      .row .nm {
        font-family: "Inter", sans-serif;
        font-size: 42px;
        font-weight: 600;
        color: var(--paper);
        flex: 1;
      }
      .row .lb {
        font-family: "Inter", sans-serif;
        font-size: 30px;
        font-weight: 600;
      }
      .row .lb.g {
        color: var(--green);
      }
      .row .lb.d {
        color: var(--dim);
      }
      .row.dimmed .nm {
        color: var(--dim);
      }

      /* ---- caption system (CapCut sticker style) ---- */
      .capzone {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 300px 70px 260px; /* keep clear of island + bottom safe area */
        gap: 34px;
        text-align: center;
      }
      .big {
        font-size: 148px;
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1;
        color: var(--ink);
      }
      .sticker {
        display: inline-block;
        border-radius: 34px;
        padding: 16px 46px 24px;
        box-shadow: 0 12px 0 rgba(20, 18, 15, 0.14);
      }
      .sticker.lilac {
        background: var(--lilac);
        color: var(--ink);
      }
      .sticker.ink {
        background: var(--ink);
        color: var(--paper);
      }
      #pov {
        font-size: 210px;
        transform: rotate(-3deg);
      }
      #cap-live {
        transform: rotate(1.5deg);
        font-size: 118px;
      }
      #cap-live em {
        font-style: normal;
        color: var(--orange);
      }
      #cap-agent {
        transform: rotate(-2deg);
        font-size: 92px;
        margin-top: 26px;
      }
      #cap-agent em {
        font-style: normal;
        color: var(--green);
      }

      /* s3 tension */
      #cap-alttab {
        font-size: 158px;
      }
      #nope {
        font-size: 240px;
        font-weight: 800;
        color: var(--red);
        border: 16px solid var(--red);
        border-radius: 48px;
        padding: 10px 60px 30px;
        transform: rotate(-7deg);
        margin-top: 30px;
      }

      /* s4 payoff */
      #cap-glance {
        font-size: 192px;
      }
      #cap-glance em {
        font-style: normal;
        color: var(--lilac-deep);
      }

      /* s5 payoff */
      #cap-mute {
        font-size: 150px;
      }
      #cap-tap {
        font-size: 150px;
        position: relative;
      }
      #tap-underline {
        position: absolute;
        left: 6%;
        bottom: -18px;
        width: 88%;
        height: 20px;
        border-radius: 10px;
        background: var(--lilac);
        transform-origin: left center;
      }

      /* s6 end card */
      #wordmark {
        font-size: 132px;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: var(--ink);
      }
      #tagline {
        font-size: 56px;
        font-weight: 800;
        color: var(--ink);
      }
      #tagline .w {
        display: inline-block;
      }
      #tagline .on {
        color: var(--lilac-deep);
      }
      #badge {
        font-family: "Inter", sans-serif;
        font-size: 42px;
        font-weight: 700;
        color: var(--ink);
        background: var(--lilac);
        border-radius: 999px;
        padding: 22px 54px;
        box-shadow: 0 12px 0 rgba(20, 18, 15, 0.12);
      }
      #confetti {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .cf {
        position: absolute;
        left: 540px;
        top: 880px;
        width: 18px;
        height: 26px;
        border-radius: 5px;
      }

      #flash-fill {
        position: absolute;
        inset: 0;
        background: #ffffff;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="12"
      data-fps="30"
      data-width="1080"
      data-height="1920"
    >
      <div id="bg"></div>

      <!-- persistent hardware layer: island 0–12, dashboard 5.2–9.2 (timeline-gated) -->
      <div id="persist" class="clip" data-start="0" data-duration="12" data-track-index="1" data-layout-allow-overflow="true">
        <div id="world">
          <div id="island">
            <div id="mic-dot"></div>
            <div id="agent-dot"></div>
            <div id="rip1" class="ripple"></div>
            <div id="rip2" class="ripple"></div>
            <div id="rip-red" class="ripple-red"></div>
          </div>
          <div id="dash">
            <div id="dash-label">AGENTS</div>
            <div class="row" id="row-claude">
              <div class="st done">✓</div>
              <div class="nm">claude</div>
              <div class="lb g">done</div>
            </div>
            <div class="row" id="row-codex">
              <div class="st work" id="codex-dot"></div>
              <div class="nm">codex</div>
              <div class="lb g">working</div>
            </div>
            <div class="row dimmed" id="row-build">
              <div class="st idle"></div>
              <div class="nm">build</div>
              <div class="lb d">idle</div>
            </div>
          </div>
        </div>
      </div>

      <!-- s1+s2 · hook + agent ping · 0.00–3.60 -->
      <div id="s1" class="clip capzone" data-start="0" data-duration="3.6" data-track-index="2">
        <h1 id="pov" class="big sticker lilac">POV:</h1>
        <h1 id="cap-live" class="big sticker ink">you're <em>live</em> on a call</h1>
        <h2 id="cap-agent" class="big sticker ink">…and your agent<br />just <em>finished</em></h2>
      </div>

      <!-- s3 · tension · 3.60–5.20 -->
      <div id="s3" class="clip capzone" data-start="3.6" data-duration="1.6" data-track-index="2">
        <h1 id="cap-alttab" class="big">alt-tab<br />mid-call?</h1>
        <div id="nope">NOPE.</div>
      </div>

      <!-- s4 · payoff: one glance · 5.20–7.60 -->
      <div id="s4" class="clip capzone" data-start="5.2" data-duration="2.4" data-track-index="2">
        <h1 id="cap-glance" class="big">one <em>glance.</em></h1>
      </div>

      <!-- s5 · payoff: mute one tap · 7.60–9.20 -->
      <div id="s5" class="clip capzone" data-start="7.6" data-duration="1.6" data-track-index="2">
        <h1 id="cap-mute" class="big">mute?</h1>
        <h1 id="cap-tap" class="big">one tap.<span id="tap-underline"></span></h1>
      </div>

      <!-- s6 · end card · 9.20–12.00 -->
      <div id="s6" class="clip capzone" data-start="9.2" data-duration="2.8" data-track-index="2">
        <div id="confetti"></div>
        <h1 id="wordmark">NotchControls</h1>
        <p id="tagline">
          <span class="w">Your</span>
          <span class="w">notch</span>
          <span class="w">is</span>
          <span class="w">a</span>
          <span class="w on">cockpit.</span>
        </p>
        <div id="badge">Free on GitHub</div>
      </div>

      <!-- mute-tap screen flash -->
      <div id="flash" class="clip" data-start="8.25" data-duration="0.4" data-track-index="3">
        <div id="flash-fill"></div>
      </div>

      <!-- ---- audio (framework-owned, direct root children) ---- -->
      <audio id="au-slam1" src="assets/sfx/impact-bass-1.mp3" data-start="0" data-duration="2.12" data-track-index="11" data-volume="0.9"></audio>
      <audio id="au-slam-nope" src="assets/sfx/impact-bass-1.mp3" data-start="4.4" data-duration="2.12" data-track-index="11" data-volume="1"></audio>
      <audio id="au-slam-word" src="assets/sfx/impact-bass-2.mp3" data-start="9.6" data-duration="2.4" data-track-index="11" data-volume="1"></audio>

      <audio id="au-slam2" src="assets/sfx/impact-bass-2.mp3" data-start="0.55" data-duration="2.59" data-track-index="12" data-volume="0.8"></audio>
      <audio id="au-slam-mute" src="assets/sfx/impact-bass-2.mp3" data-start="7.6" data-duration="1.9" data-track-index="12" data-volume="0.7"></audio>

      <audio id="au-chime" src="assets/sfx/chime.mp3" data-start="1.8" data-duration="2.5" data-track-index="13" data-volume="0.55"></audio>
      <audio id="au-click-r1" src="assets/sfx/click-soft.mp3" data-start="5.5" data-duration="0.37" data-track-index="13" data-volume="0.7"></audio>
      <audio id="au-click-mute" src="assets/sfx/click.mp3" data-start="8.3" data-duration="0.37" data-track-index="13" data-volume="0.95"></audio>

      <audio id="au-ping" src="assets/sfx/pop.mp3" data-start="1.8" data-duration="0.72" data-track-index="14" data-volume="0.8"></audio>
      <audio id="au-glitch" src="assets/sfx/glitch-1.mp3" data-start="3.6" data-duration="0.8" data-track-index="14" data-volume="0.75"></audio>
      <audio id="au-click-r2" src="assets/sfx/click-soft.mp3" data-start="5.65" data-duration="0.37" data-track-index="14" data-volume="0.7"></audio>

      <audio id="au-whoosh-dash" src="assets/sfx/whoosh.mp3" data-start="5.15" data-duration="0.57" data-track-index="15" data-volume="0.85"></audio>
      <audio id="au-pop-r3" src="assets/sfx/pop.mp3" data-start="5.8" data-duration="0.72" data-track-index="15" data-volume="0.55"></audio>
      <audio id="au-whoosh-out" src="assets/sfx/whoosh.mp3" data-start="8.95" data-duration="0.57" data-track-index="15" data-volume="0.5"></audio>
      <audio id="au-pop-badge" src="assets/sfx/pop.mp3" data-start="10.8" data-duration="0.72" data-track-index="15" data-volume="0.7"></audio>

      <!-- riser tail: peak lands exactly at 9.60 (wordmark slam) -->
      <audio id="au-riser" src="assets/sfx/riser-tail.mp3" data-start="5.6" data-duration="4" data-track-index="16" data-volume="0.5"></audio>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const F = 1 / 30;

      /* ---- deterministic confetti (seeded, no Math.random) ---- */
      function mulberry32(seed) {
        return function () {
          seed |= 0;
          seed = (seed + 0x6d2b79f5) | 0;
          let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      const rng = mulberry32(42);
      const cfColors = ["#b79cff", "#32d74b", "#ff9f0a", "#14120f"];
      const cfHost = document.getElementById("confetti");
      const confetti = [];
      for (let i = 0; i < 18; i++) {
        const d = document.createElement("div");
        d.className = "cf";
        d.style.background = cfColors[i % cfColors.length];
        cfHost.appendChild(d);
        confetti.push({
          el: d,
          x: (rng() - 0.5) * 900,
          y: -(120 + rng() * 420),
          fall: 500 + rng() * 380,
          rot: (rng() - 0.5) * 540,
          dur: 1.5 + rng() * 0.7,
        });
      }

      /* ---- seek-safe gating for delayed elements ---- */
      gsap.set(
        ["#agent-dot", "#rip1", "#rip2", "#rip-red", "#cap-agent", "#nope", "#dash", "#tap-underline", "#tagline .w", "#badge", ".cf", "#flash-fill"],
        { autoAlpha: 0 }
      );

      /* ============ POV camera drift (anchored on the island) ============ */
      tl.fromTo("#world", { scale: 1 }, { scale: 1.07, duration: 5.0, ease: "sine.inOut" }, 0);
      tl.to("#world", { scale: 1, duration: 0.45, ease: "power3.out" }, 5.15);

      /* mic dot live pulse (finite, ends before the flip) */
      tl.to("#mic-dot", { scale: 1.3, duration: 0.38, ease: "sine.inOut", yoyo: true, repeat: 15 }, 0.2);

      /* ============ s1 · hook (beats 0.00, 0.55) ============ */
      tl.fromTo("#pov", { y: -420, scale: 1.25, autoAlpha: 0 }, { y: 0, scale: 1, autoAlpha: 1, duration: 0.3, ease: "power4.out" }, 0);
      tl.to("#pov", { keyframes: [{ x: -9, duration: F }, { x: 7, duration: F }, { x: 0, duration: F }], ease: "none" }, 0.3);
      tl.fromTo("#cap-live", { y: 340, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.3, ease: "power4.out" }, 0.55);
      tl.to("#cap-live", { keyframes: [{ x: 8, duration: F }, { x: -6, duration: F }, { x: 0, duration: F }], ease: "none" }, 0.85);
      /* sticker idle wobble — stickers feel hand-placed, not frozen */
      tl.to("#pov", { rotation: "+=1.6", duration: 0.55, ease: "sine.inOut", yoyo: true, repeat: 3 }, 1.0);
      tl.to("#cap-live", { rotation: "-=1.2", duration: 0.6, ease: "sine.inOut", yoyo: true, repeat: 3 }, 1.1);

      /* ============ s2 · agent ping (beat 1.80) ============ */
      tl.fromTo("#agent-dot", { scale: 0, autoAlpha: 0 }, { scale: 1, autoAlpha: 1, duration: 0.35, ease: "back.out(2.2)" }, 1.82);
      tl.fromTo("#rip1", { scale: 0.3, autoAlpha: 0.9 }, { scale: 3, autoAlpha: 0, duration: 0.7, ease: "power2.out" }, 1.82);
      tl.fromTo("#rip2", { scale: 0.3, autoAlpha: 0.7 }, { scale: 3.6, autoAlpha: 0, duration: 0.8, ease: "power2.out" }, 2.02);
      /* island glow bloom on the ping */
      tl.to("#island", { boxShadow: "0 18px 44px rgba(20,18,15,0.22), 0 0 60px rgba(50,215,75,0.55)", duration: 0.2, ease: "power2.out" }, 1.82);
      tl.to("#island", { boxShadow: "0 18px 44px rgba(20,18,15,0.22), 0 0 0px rgba(50,215,75,0)", duration: 0.7, ease: "power2.in" }, 2.1);
      tl.fromTo(
        "#cap-agent",
        { rotation: -10, scale: 0.5, autoAlpha: 0 },
        { rotation: -2, scale: 1, autoAlpha: 1, duration: 0.45, ease: "back.out(1.8)" },
        1.85
      );
      /* exit up under the tension cut */
      tl.to(["#pov", "#cap-live", "#cap-agent"], { y: "-=90", autoAlpha: 0, duration: 0.15, ease: "power2.in" }, 3.45);
      tl.set(["#pov", "#cap-live", "#cap-agent"], { autoAlpha: 0 }, 3.6);

      /* ============ s3 · tension (beats 3.60, 4.40) ============ */
      tl.fromTo("#cap-alttab", { y: -260, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.28, ease: "power4.out" }, 3.6);
      /* nervous jitter while the glitch plays */
      tl.to(
        "#cap-alttab",
        {
          keyframes: [
            { x: -6, rotation: -0.6, duration: 0.06 },
            { x: 6, rotation: 0.6, duration: 0.06 },
            { x: -5, rotation: -0.5, duration: 0.06 },
            { x: 5, rotation: 0.5, duration: 0.06 },
            { x: -3, rotation: -0.3, duration: 0.06 },
            { x: 0, rotation: 0, duration: 0.06 },
          ],
          ease: "none",
        },
        3.95
      );
      /* NOPE. stamp slams down */
      tl.fromTo("#nope", { scale: 2.4, autoAlpha: 0, rotation: -14 }, { scale: 0.96, autoAlpha: 1, rotation: -7, duration: 0.2, ease: "power4.in" }, 4.4);
      /* thud settle: compressed on impact, springs back to rest */
      tl.to("#nope", { scale: 1, duration: 0.14, ease: "back.out(3)" }, 4.6);
      /* frame shake on stamp impact */
      tl.to(["#world", "#s3"], { keyframes: [{ y: 14, duration: F }, { y: -10, duration: F }, { y: 6, duration: F }, { y: 0, duration: F }], ease: "none" }, 4.62);
      /* hard cut out at 5.2 (clip window ends) */

      /* ============ s4 · fleet dashboard (beats 5.20, 5.65, 5.85, 6.05) ============ */
      tl.fromTo("#dash", { scaleY: 0, autoAlpha: 0 }, { scaleY: 1, autoAlpha: 1, duration: 0.5, ease: "power3.out" }, 5.2);
      tl.fromTo("#dash-label", { x: -26, autoAlpha: 0 }, { x: 0, autoAlpha: 1, duration: 0.3, ease: "power2.out" }, 5.35);
      tl.fromTo("#cap-glance", { scale: 0.6, autoAlpha: 0 }, { scale: 1, autoAlpha: 1, duration: 0.35, ease: "back.out(2)" }, 5.35);
      tl.fromTo("#row-claude", { y: 26, autoAlpha: 0, scale: 0.9 }, { y: 0, autoAlpha: 1, scale: 1, duration: 0.4, ease: "back.out(1.7)" }, 5.5);
      tl.fromTo("#row-codex", { y: 26, autoAlpha: 0, scale: 0.9 }, { y: 0, autoAlpha: 1, scale: 1, duration: 0.4, ease: "back.out(1.7)" }, 5.65);
      tl.fromTo("#row-build", { y: 26, autoAlpha: 0, scale: 0.9 }, { y: 0, autoAlpha: 1, scale: 1, duration: 0.4, ease: "back.out(1.7)" }, 5.8);
      /* codex is working — its dot breathes */
      tl.to("#codex-dot", { scale: 1.35, duration: 0.35, ease: "sine.inOut", yoyo: true, repeat: 7 }, 6.1);
      /* glance caption exits before the mute beat */
      tl.to("#cap-glance", { y: 60, autoAlpha: 0, duration: 0.15, ease: "power2.in" }, 7.45);
      tl.set("#cap-glance", { autoAlpha: 0 }, 7.6);

      /* ============ s5 · mute one tap (beats 7.60, 8.30) ============ */
      tl.fromTo("#cap-mute", { y: -220, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.28, ease: "power4.out" }, 7.6);
      tl.fromTo("#cap-tap", { y: 220, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.28, ease: "power4.out" }, 7.75);
      /* the tap: mic flips orange→red with a punch + red ripple + screen flash */
      tl.to("#mic-dot", { backgroundColor: "#ff3b30", duration: 0.08, ease: "none" }, 8.3);
      tl.to("#mic-dot", { scale: 1.45, duration: 0.12, ease: "sine.inOut", yoyo: true, repeat: 1 }, 8.3);
      tl.fromTo("#rip-red", { scale: 0.3, autoAlpha: 0.9 }, { scale: 3, autoAlpha: 0, duration: 0.6, ease: "power2.out" }, 8.3);
      /* red glow answer to the green bloom — the tap has weight */
      tl.to("#island", { boxShadow: "0 18px 44px rgba(20,18,15,0.22), 0 0 60px rgba(255,59,48,0.5)", duration: 0.15, ease: "power2.out" }, 8.3);
      tl.to("#island", { boxShadow: "0 18px 44px rgba(20,18,15,0.22), 0 0 0px rgba(255,59,48,0)", duration: 0.6, ease: "power2.in" }, 8.5);
      tl.fromTo("#flash-fill", { autoAlpha: 0 }, { autoAlpha: 0.5, duration: 0.05, ease: "power2.out" }, 8.28);
      tl.to("#flash-fill", { autoAlpha: 0, duration: 0.12, ease: "power3.in" }, 8.33);
      tl.fromTo("#tap-underline", { scaleX: 0, autoAlpha: 1 }, { scaleX: 1, autoAlpha: 1, duration: 0.35, ease: "expo.out" }, 8.35);
      /* exit: captions + dashboard collapse under the whoosh */
      tl.to(["#cap-mute", "#cap-tap"], { autoAlpha: 0, y: "-=70", duration: 0.18, ease: "power2.in" }, 9.0);
      tl.to("#dash", { scaleY: 0, autoAlpha: 0, duration: 0.25, ease: "power2.in" }, 8.95);
      tl.set("#dash", { autoAlpha: 0 }, 9.2);
      tl.set(["#cap-mute", "#cap-tap"], { autoAlpha: 0 }, 9.2);

      /* ============ s6 · end card (beats 9.35, 9.60, 10.25, 10.80) ============ */
      /* island goes green — everything is done */
      tl.to("#mic-dot", { backgroundColor: "#32d74b", duration: 0.25, ease: "none" }, 9.35);
      tl.fromTo("#wordmark", { y: -340, scale: 1.12, autoAlpha: 0 }, { y: 0, scale: 1, autoAlpha: 1, duration: 0.35, ease: "power4.out" }, 9.6);
      tl.to("#wordmark", { keyframes: [{ x: -10, duration: F }, { x: 8, duration: F }, { x: 0, duration: F }], ease: "none" }, 9.95);
      /* confetti burst from the wordmark */
      confetti.forEach((c, i) => {
        tl.fromTo(
          c.el,
          { x: 0, y: 0, rotation: 0, autoAlpha: 0 },
          { x: c.x, y: c.y, rotation: c.rot, autoAlpha: 1, duration: 0.42, ease: "power3.out" },
          9.62 + (i % 3) * 0.03
        );
        tl.to(c.el, { y: c.y + c.fall, x: c.x * 1.18, rotation: c.rot * 1.6, autoAlpha: 0, duration: c.dur, ease: "power1.in" }, 10.05 + (i % 3) * 0.03);
      });
      tl.fromTo("#tagline .w", { autoAlpha: 0, y: 26 }, { autoAlpha: 1, y: 0, duration: 0.4, ease: "power3.out", stagger: 0.08 }, 10.25);
      tl.fromTo("#badge", { scale: 0, autoAlpha: 0 }, { scale: 1, autoAlpha: 1, duration: 0.45, ease: "back.out(2)" }, 10.8);
      /* held breath to the end */
      tl.to("#wordmark", { scale: 1.015, duration: 1.5, ease: "sine.inOut" }, 10.4);
      tl.to("#badge", { scale: 1.035, duration: 0.35, ease: "sine.inOut", yoyo: true, repeat: 1 }, 11.35);

      /* ---- audio ducking: glitch clipped to 0.8s, fade the tail ---- */
      tl.to("#au-glitch", { volume: 0, duration: 0.2, ease: "none" }, 4.2);

      tl.seek(0);
      window.__timelines["main"] = tl;
    </script>
