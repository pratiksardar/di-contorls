<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /* self-hosted fonts — deterministic render */
      @font-face {
        font-family: "Bricolage Grotesque";
        font-weight: 800;
        font-style: normal;
        src: url("assets/fonts/bricolage-800-latin.woff2") format("woff2");
      }
      @font-face {
        font-family: "Space Grotesk";
        font-weight: 100 900;
        font-style: normal;
        src: url("assets/fonts/space-grotesk-latin.woff2") format("woff2");
      }

      :root {
        /* bubblegum palette */
        --pink: #ffd6e8;
        --lavender: #e6dfff;
        --mint: #d3f5e6;
        --cream: #fff9f2;
        --ink: #1a1025;
        --notch: #111111;
        --hot: #d92a52; /* darkened for 3:1 contrast on pastel fields */
        --agent: #34d399;
        --sun: #ffb347;
        --white: #ffffff;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--cream);
      }
      body {
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }
      #bg {
        position: absolute;
        inset: 0;
        background: var(--pink);
      }

      /* floating pastel blobs (decorative, persistent) */
      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(2px);
        opacity: 0.55;
      }
      #blob-a { width: 520px; height: 520px; left: -160px; top: -180px; background: var(--lavender); }
      #blob-b { width: 640px; height: 640px; right: -220px; bottom: -260px; background: var(--mint); }
      #blob-c { width: 300px; height: 300px; left: 180px; bottom: -110px; background: var(--sun); opacity: 0.35; }
      #blob-d { width: 360px; height: 360px; right: 240px; top: -140px; background: var(--pink); }

      /* scenes: absolutely stacked, timeline-gated */
      .scene {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 100px 120px;
        gap: 28px;
      }

      .headline {
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 800;
        line-height: 0.95;
        letter-spacing: -0.02em;
        text-align: center;
        color: var(--ink);
      }
      .headline .word {
        display: inline-block;
        white-space: pre;
      }
      .em { color: var(--hot); }

      /* the ONE black element: notch island pill */
      .notch {
        position: absolute;
        top: 0;
        left: 50%;
        margin-left: -190px;
        width: 380px;
        height: 92px;
        background: var(--notch);
        border-radius: 0 0 46px 46px;
        z-index: 5;
      }
      .notch-island {
        position: relative;
        width: 460px;
        height: 110px;
        background: var(--notch);
        border-radius: 55px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 26px;
      }
      .dot { border-radius: 50%; }

      /* confetti + starburst layers */
      .burst-layer {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 0;
        height: 0;
        z-index: 3;
      }
      .confetti {
        position: absolute;
        width: 26px;
        height: 26px;
        left: -13px;
        top: -13px;
      }
      .rays {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 1500px;
        height: 1500px;
        margin: -750px 0 0 -750px;
        border-radius: 50%;
        background: repeating-conic-gradient(
          var(--sun) 0deg 6deg,
          transparent 6deg 30deg
        );
        opacity: 0.5;
        z-index: 0;
      }

      /* sticker badge */
      .sticker {
        position: absolute;
        font-family: "Bricolage Grotesque", sans-serif;
        font-weight: 800;
        font-size: 56px;
        padding: 26px 44px;
        border-radius: 999px;
        background: var(--sun);
        color: var(--ink);
        border: 6px solid var(--ink);
        box-shadow: 10px 10px 0 rgba(26, 16, 37, 0.18);
        z-index: 6;
      }

      /* scene 4 — mic chip */
      #mic-chip {
        position: absolute;
        top: 130px;
        left: 50%;
        margin-left: -60px;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: var(--white);
        border: 6px solid var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 6;
      }
      #mic-slash {
        position: absolute;
        width: 92px;
        height: 10px;
        border-radius: 5px;
        background: var(--hot);
      }
      #underline {
        height: 18px;
        width: 560px;
        border-radius: 9px;
        background: var(--hot);
        transform-origin: left center;
      }

      /* scene 5 — prompter lines */
      .prompt-line {
        height: 30px;
        border-radius: 15px;
        background: var(--white);
        border: 4px solid var(--ink);
      }
      #prompter {
        position: absolute;
        top: 120px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        z-index: 4;
      }

      /* scene 6 — agent dots */
      .agent-pod {
        position: absolute;
        top: 140px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        z-index: 6;
      }
      .agent-dot {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        background: var(--agent);
        border: 6px solid var(--ink);
      }
      .agent-label {
        font-size: 28px;
        font-weight: 700;
        background: var(--white);
        border: 4px solid var(--ink);
        border-radius: 999px;
        padding: 6px 20px;
      }

      /* end card */
      #wordmark { font-size: 150px; position: relative; z-index: 4; }
      #tagline { font-size: 48px; font-weight: 500; letter-spacing: 0.01em; }
      #cta {
        font-size: 40px;
        font-weight: 700;
        padding: 22px 54px;
        border-radius: 999px;
        background: var(--white);
        border: 6px solid var(--ink);
        box-shadow: 10px 10px 0 rgba(26, 16, 37, 0.15);
      }
      .small-kicker {
        font-size: 34px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-fps="30"
      data-width="1920"
      data-height="1080"
    >
      <div id="bg"></div>
      <div class="blob" id="blob-a"></div>
      <div class="blob" id="blob-b"></div>
      <div class="blob" id="blob-c"></div>
      <div class="blob" id="blob-d"></div>

      <div id="show" class="clip" data-start="0" data-duration="10" data-track-index="1" style="position:absolute; inset:0;">
        <!-- S1: YOUR NOTCH -->
        <div class="scene" id="s1">
          <div class="notch" id="notch1"></div>
          <div class="burst-layer" id="burst1"></div>
          <div class="headline" style="font-size: 240px">
            <span class="word" id="s1w1">YOUR </span><span class="word em" id="s1w2">NOTCH</span>
          </div>
        </div>

        <!-- S2: JUST GOT -->
        <div class="scene" id="s2">
          <div class="headline" style="font-size: 250px">
            <span class="word" id="s2w">JUST GOT</span>
          </div>
        </div>

        <!-- S3: SUPERPOWERS -->
        <div class="scene" id="s3">
          <div class="rays" id="rays"></div>
          <div class="burst-layer" id="burst3"></div>
          <div class="headline em" id="s3w" style="font-size: 236px; z-index: 2">SUPERPOWERS</div>
          <div class="sticker" id="wow" style="right: 200px; top: 170px">WOW!</div>
        </div>

        <!-- S4: MUTE. INSTANTLY. -->
        <div class="scene" id="s4">
          <div class="notch" id="notch4"></div>
          <div id="mic-chip">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#1a1025" stroke-width="2.4" stroke-linecap="round">
              <path d="M12 15a3.5 3.5 0 0 0 3.5-3.5v-6a3.5 3.5 0 0 0-7 0v6A3.5 3.5 0 0 0 12 15z" fill="#1a1025" />
              <path d="M19 11.5a7 7 0 0 1-14 0" />
              <line x1="12" y1="18.5" x2="12" y2="22" />
            </svg>
            <div id="mic-slash"></div>
          </div>
          <div class="headline" style="font-size: 190px; margin-top: 60px">
            <span class="word" id="s4w1">MUTE. </span><span class="word em" id="s4w2">INSTANTLY.</span>
          </div>
          <div id="underline"></div>
        </div>

        <!-- S5: INVISIBLE PROMPTER -->
        <div class="scene" id="s5">
          <div class="notch" id="notch5"></div>
          <div id="prompter">
            <div class="prompt-line" id="pl1" style="width: 520px"></div>
            <div class="prompt-line" id="pl2" style="width: 430px"></div>
            <div class="prompt-line" id="pl3" style="width: 480px"></div>
          </div>
          <div class="headline" style="font-size: 180px; margin-top: 80px">
            <span class="word em" id="s5w1">INVISIBLE</span><br />
            <span class="word" id="s5w2">PROMPTER</span>
          </div>
          <div class="small-kicker" id="s5k">CAPTURE CAN'T SEE IT</div>
        </div>

        <!-- S6: AGENTS. WATCHED. -->
        <div class="scene" id="s6">
          <div class="notch" id="notch6"></div>
          <div class="agent-pod" id="pod1" style="left: 620px">
            <div class="agent-dot"></div>
            <div class="agent-label">claude</div>
          </div>
          <div class="agent-pod" id="pod2" style="left: 910px">
            <div class="agent-dot"></div>
            <div class="agent-label">codex</div>
          </div>
          <div class="agent-pod" id="pod3" style="left: 1190px">
            <div class="agent-dot"></div>
            <div class="agent-label">build</div>
          </div>
          <div class="headline" style="font-size: 190px; margin-top: 80px">
            <span class="word" id="s6w1">AGENTS. </span><span class="word em" id="s6w2">WATCHED.</span>
          </div>
        </div>

        <!-- S7: end card -->
        <div class="scene" id="s7" style="gap: 34px">
          <div class="burst-layer" id="burst7" style="top: 40%"></div>
          <div class="notch-island" id="island">
            <div class="dot" style="width: 26px; height: 26px; background: var(--hot)"></div>
            <div class="dot" style="width: 26px; height: 26px; background: var(--agent)"></div>
            <div class="dot" style="width: 26px; height: 26px; background: var(--sun)"></div>
          </div>
          <div class="headline" id="wordmark">NotchControls</div>
          <div id="tagline">Your notch, now a cockpit.</div>
          <div id="cta">Free on GitHub</div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      const INK = "#1a1025";
      const BG = { pink: "#ffd6e8", lavender: "#e6dfff", mint: "#d3f5e6", cream: "#fff9f2" };
      const CONF = ["#ff4d6d", "#e6dfff", "#34d399", "#ffb347", "#ffffff", "#ffd6e8"];

      // deterministic PRNG (no Math.random)
      function mulberry32(a) {
        return function () {
          a |= 0; a = (a + 0x6d2b79f5) | 0;
          let t = Math.imul(a ^ (a >>> 15), 1 | a);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      // build confetti pieces into a burst layer; returns els
      function makeConfetti(layerId, count, seed) {
        const layer = document.getElementById(layerId);
        const rnd = mulberry32(seed);
        const els = [];
        for (let i = 0; i < count; i++) {
          const el = document.createElement("div");
          el.className = "confetti";
          el.style.background = CONF[i % CONF.length];
          el.style.borderRadius = i % 3 === 0 ? "50%" : "6px";
          layer.appendChild(el);
          el.__ang = rnd() * Math.PI * 2;
          el.__dist = 320 + rnd() * 560;
          el.__rot = (rnd() - 0.5) * 720;
          el.__dur = 0.7 + rnd() * 0.5;
          gsap.set(el, { autoAlpha: 0 });
          els.push(el);
        }
        return els;
      }

      // pop a confetti set at time t on the master timeline
      function popConfetti(els, t) {
        els.forEach((el) => {
          tl.set(el, { autoAlpha: 1, x: 0, y: 0, scale: 1, rotation: 0 }, t);
          tl.to(
            el,
            {
              x: Math.cos(el.__ang) * el.__dist,
              y: Math.sin(el.__ang) * el.__dist * 0.7,
              rotation: el.__rot,
              scale: 0.4,
              autoAlpha: 0,
              duration: el.__dur,
              ease: "power2.out",
            },
            t
          );
        });
      }

      const scenes = ["#s1", "#s2", "#s3", "#s4", "#s5", "#s6", "#s7"];
      const bounds = [0, 1.1, 2.1, 3.7, 5.1, 6.5, 7.9, 10.0];
      // gate scenes (seek-safe: autoAlpha via timeline sets)
      scenes.forEach((s, i) => {
        gsap.set(s, { autoAlpha: i === 0 ? 1 : 0 });
        if (i > 0) tl.set(s, { autoAlpha: 1 }, bounds[i]);
        if (i < scenes.length - 1) tl.set(s, { autoAlpha: 0 }, bounds[i + 1]);
      });

      // background beats
      tl.to("#bg", { backgroundColor: BG.lavender, duration: 0.3 }, 1.05);
      tl.to("#bg", { backgroundColor: BG.mint, duration: 0.3 }, 2.05);
      tl.to("#bg", { backgroundColor: BG.cream, duration: 0.3 }, 3.65);
      tl.to("#bg", { backgroundColor: BG.lavender, duration: 0.3 }, 5.05);
      tl.to("#bg", { backgroundColor: BG.mint, duration: 0.3 }, 6.45);
      tl.to("#bg", { backgroundColor: BG.cream, duration: 0.35 }, 7.85);

      // blob drift (finite yoyo repeats across full duration)
      tl.to("#blob-a", { x: 70, y: 50, duration: 5, yoyo: true, repeat: 1, ease: "sine.inOut" }, 0);
      tl.to("#blob-b", { x: -60, y: -70, duration: 5, yoyo: true, repeat: 1, ease: "sine.inOut" }, 0);
      tl.to("#blob-c", { x: 50, y: -40, duration: 2.5, yoyo: true, repeat: 3, ease: "sine.inOut" }, 0);
      tl.to("#blob-d", { x: -40, y: 45, duration: 2.5, yoyo: true, repeat: 3, ease: "sine.inOut" }, 0);

      // ── S1: YOUR NOTCH (0 – 1.1)
      tl.fromTo("#notch1", { y: -120 }, { y: 0, duration: 0.45, ease: "bounce.out" }, 0.05);
      tl.fromTo("#s1w1", { scale: 0.4, autoAlpha: 0 }, { scale: 1, autoAlpha: 1, duration: 0.4, ease: "back.out(2.4)" }, 0.08);
      tl.fromTo("#s1w2", { scale: 0.4, autoAlpha: 0 }, { scale: 1, autoAlpha: 1, duration: 0.42, ease: "back.out(2.4)" }, 0.22);
      const conf1 = makeConfetti("burst1", 22, 7);
      popConfetti(conf1, 0.3);

      // ── S2: JUST GOT (1.1 – 2.1) — slam + squash-and-stretch
      tl.fromTo("#s2w", { y: -560, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.38, ease: "power4.out" }, 1.12);
      tl.to("#s2w", { scaleY: 0.82, scaleX: 1.1, duration: 0.09, yoyo: true, repeat: 1, ease: "sine.inOut" }, 1.5);

      // ── S3: SUPERPOWERS (2.1 – 3.7)
      tl.fromTo("#rays", { scale: 0, rotation: -30, autoAlpha: 0 }, { scale: 1, rotation: 0, autoAlpha: 0.5, duration: 0.6, ease: "power2.out" }, 2.12);
      tl.to("#rays", { rotation: 40, duration: 1.5, ease: "none" }, 2.72);
      tl.fromTo("#s3w", { scale: 0.2, autoAlpha: 0 }, { scale: 1, autoAlpha: 1, duration: 0.7, ease: "elastic.out(1, 0.45)" }, 2.12);
      tl.to("#s3w", { scale: 1.08, duration: 0.16, yoyo: true, repeat: 1, ease: "sine.inOut" }, 2.9);
      tl.fromTo("#wow", { scale: 0, rotation: -40, autoAlpha: 0 }, { scale: 1, rotation: 12, autoAlpha: 1, duration: 0.5, ease: "back.out(3)" }, 2.5);
      tl.to("#wow", { rotation: 4, duration: 0.7, ease: "sine.inOut" }, 3.0);
      const conf3 = makeConfetti("burst3", 30, 21);
      popConfetti(conf3, 2.35);

      // ── S4: MUTE. INSTANTLY. (3.7 – 5.1)
      tl.fromTo("#notch4", { y: -120 }, { y: 0, duration: 0.35, ease: "power3.out" }, 3.7);
      tl.fromTo("#mic-chip", { y: -80, scale: 0, autoAlpha: 0 }, { y: 0, scale: 1, autoAlpha: 1, duration: 0.45, ease: "back.out(2.2)" }, 3.85);
      tl.fromTo("#s4w1", { y: 180, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.45, ease: "back.out(1.8)" }, 3.8);
      tl.fromTo("#s4w2", { y: 180, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.45, ease: "back.out(1.8)" }, 3.95);
      // mic goes MUTED on the beat: chip flushes red + slash sweeps + shake
      gsap.set("#mic-slash", { scaleX: 0, rotation: -45, transformOrigin: "left center" });
      tl.to("#mic-chip", { backgroundColor: "#ffb8c9", duration: 0.12 }, 4.2);
      tl.to("#mic-slash", { scaleX: 1, duration: 0.16, ease: "power3.out" }, 4.2);
      tl.to("#mic-chip", { keyframes: [{ x: -7 }, { x: 7 }, { x: -4 }, { x: 0 }], duration: 0.26, ease: "none" }, 4.24);
      gsap.set("#underline", { scaleX: 0 });
      tl.to("#underline", { scaleX: 1, duration: 0.35, ease: "power3.out" }, 4.25);

      // ── S5: INVISIBLE PROMPTER (5.1 – 6.5)
      tl.fromTo("#notch5", { y: -120 }, { y: 0, duration: 0.3, ease: "power3.out" }, 5.1);
      tl.fromTo("#pl1", { y: -60, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.35, ease: "power2.out" }, 5.3);
      tl.fromTo("#pl2", { y: -60, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.35, ease: "power2.out" }, 5.45);
      tl.fromTo("#pl3", { y: -60, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.35, ease: "power2.out" }, 5.6);
      tl.fromTo("#s5w1", { autoAlpha: 0, filter: "blur(22px)", scale: 1.15 }, { autoAlpha: 1, filter: "blur(0px)", scale: 1, duration: 0.55, ease: "power2.out" }, 5.15);
      tl.fromTo("#s5w2", { y: 120, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.4, ease: "back.out(1.7)" }, 5.4);
      tl.fromTo("#s5k", { autoAlpha: 0, y: 40 }, { autoAlpha: 0.75, y: 0, duration: 0.35, ease: "power2.out" }, 5.75);

      // ── S6: AGENTS. WATCHED. (6.5 – 7.9)
      tl.fromTo("#notch6", { y: -120 }, { y: 0, duration: 0.3, ease: "power3.out" }, 6.5);
      tl.fromTo("#pod1", { y: -110, scale: 0, autoAlpha: 0 }, { y: 0, scale: 1, autoAlpha: 1, duration: 0.4, ease: "back.out(2.6)" }, 6.62);
      tl.fromTo("#pod2", { y: -110, scale: 0, autoAlpha: 0 }, { y: 0, scale: 1, autoAlpha: 1, duration: 0.4, ease: "back.out(2.6)" }, 6.74);
      tl.fromTo("#pod3", { y: -110, scale: 0, autoAlpha: 0 }, { y: 0, scale: 1, autoAlpha: 1, duration: 0.4, ease: "back.out(2.6)" }, 6.86);
      tl.to(".agent-dot", { scale: 1.18, duration: 0.22, yoyo: true, repeat: 1, ease: "sine.inOut", stagger: 0.08 }, 7.15);
      tl.fromTo("#s6w1", { scale: 0.5, autoAlpha: 0 }, { scale: 1, autoAlpha: 1, duration: 0.4, ease: "back.out(2.2)" }, 6.7);
      tl.fromTo("#s6w2", { scale: 0.5, autoAlpha: 0 }, { scale: 1, autoAlpha: 1, duration: 0.4, ease: "back.out(2.2)" }, 6.9);

      // ── S7: end card (7.9 – 10)
      tl.fromTo("#island", { y: -240, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.5, ease: "bounce.out" }, 7.95);
      tl.to("#island", { scaleY: 0.86, scaleX: 1.08, duration: 0.09, yoyo: true, repeat: 1, ease: "sine.inOut" }, 8.5);
      tl.fromTo("#wordmark", { scale: 0.5, autoAlpha: 0 }, { scale: 1, autoAlpha: 1, duration: 0.5, ease: "back.out(2)" }, 8.15);
      tl.fromTo("#tagline", { y: 60, autoAlpha: 0 }, { y: 0, autoAlpha: 1, duration: 0.4, ease: "power2.out" }, 8.45);
      tl.fromTo("#cta", { scale: 0, autoAlpha: 0 }, { scale: 1, autoAlpha: 1, duration: 0.45, ease: "back.out(2.6)" }, 8.7);
      tl.to("#cta", { scale: 1.03, duration: 0.4, yoyo: true, repeat: 1, ease: "sine.inOut" }, 9.2);
      const conf7 = makeConfetti("burst7", 26, 33);
      popConfetti(conf7, 8.2);

      tl.seek(0);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
